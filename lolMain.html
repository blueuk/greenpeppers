<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Utility Dashboard</title>
    <style>
        :root {
            --hextech-gold: #c89b3c;
            --hextech-border: #785a28;
            --bg-dark: #010a13;
            --sidebar-width: 260px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden; /* 메인 스크롤은 iframe 내부에서 처리 */
        }

        /* 사이드바 스타일 */
        .sidebar {
            position: fixed; left: -260px; top: 0;
            width: var(--sidebar-width); height: 100%;
            background: #050d16; border-right: 2px solid var(--hextech-border);
            transition: 0.3s ease-in-out; z-index: 1000;
            display: flex; flex-direction: column;
            box-shadow: 10px 0 20px rgba(0,0,0,0.5);
        }

        .sidebar.active { left: 0; }

        .sidebar-header {
            padding: 30px 20px;
            border-bottom: 1px solid var(--hextech-border);
            text-align: center;
        }

        .sidebar-header h2 {
            color: var(--hextech-gold); margin: 0; font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .menu-list { list-style: none; padding: 20px 0; margin: 0; }
        .menu-item {
            padding: 15px 25px; color: #f0e6d2; cursor: pointer;
            transition: 0.3s; border-left: 4px solid transparent;
            font-weight: bold;
        }

        .menu-item:hover {
            background: rgba(200, 155, 60, 0.1);
            color: var(--hextech-gold);
            border-left: 4px solid var(--hextech-gold);
        }

        /* 햄버거 버튼 */
        .hamburger {
            position: fixed; top: 20px; left: 20px;
            width: 40px; height: 35px; cursor: pointer;
            z-index: 1100; display: flex; flex-direction: column;
            justify-content: space-between; padding: 5px;
            background: rgba(1, 10, 19, 0.8); border-radius: 4px;
            border: 1px solid var(--hextech-gold);
        }

        .hamburger span {
            display: block; width: 100%; height: 3px;
            background: var(--hextech-gold); transition: 0.3s;
        }

        /* 메인 콘텐츠 영역 */
        .main-content {
            width: 100%; height: 100%;
            transition: 0.3s ease-in-out;
            padding: 0;
        }

        iframe {
            width: 100%; height: 100%; border: none;
            background: var(--bg-dark);
        }

        /* 배경 어둡게 (사이드바 열릴 때) */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; z-index: 900;
        }
        .overlay.active { display: block; }

    </style>
</head>
<body>

    <div class="hamburger" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>LOL MENU</h2>
        </div>
        <ul class="menu-list">
            <li class="menu-item" onclick="loadPage('https://blueuk.github.io/greenpeppers/lolRandomTeam.html', '랜덤 팀/포지션 배정')">
                🏆 팀/포지션 배정
            </li>
            <li class="menu-item" onclick="loadPage('https://blueuk.github.io/greenpeppers/lolRandomTeam2.html', '랜덤 챔피언 조합')">
                ⚔️ 랜덤 챔피언 조합
            </li>
        </ul>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="main-content">
        <iframe id="mainFrame" src="https://blueuk.github.io/greenpeppers/lolRandomTeam.html"></iframe>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function loadPage(url, title) {
            const iframe = document.getElementById('mainFrame');
            iframe.src = url;
            
            // 메뉴 닫기
            toggleMenu();
            
            // 콘솔이나 제목 업데이트 (선택 사항)
            console.log("페이지 이동: " + title);
        }

        // ESC 키 누르면 메뉴 닫기
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const sidebar = document.getElementById('sidebar');
                if (sidebar.classList.contains('active')) toggleMenu();
            }
        });
    </script>
</body>
</html>
