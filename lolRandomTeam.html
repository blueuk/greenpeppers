<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOL CUSTOM MATCH</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background: radial-gradient(circle, #0a1428 0%, #010a13 100%); 
            color: #f0e6d2; 
            margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 900px; }

        h1 { 
            text-align: center; color: #c8aa6e; text-transform: uppercase; 
            letter-spacing: 5px; border-bottom: 2px solid #c89b3c;
            padding-bottom: 15px; margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(200, 170, 110, 0.5);
        }

        /* 입력창 구역 */
        .input-section { 
            background: rgba(1, 10, 19, 0.9); border: 1px solid #5b5a56;
            padding: 25px; border-radius: 2px; margin-bottom: 30px;
            box-shadow: inset 0 0 10px #000;
        }
        .input-grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); 
            gap: 12px; margin-bottom: 20px;
        }
        input { 
            background: #1e2328; border: 1px solid #5b5a56; color: #f0e6d2;
            padding: 10px; outline: none; transition: 0.2s; text-align: center;
        }
        input:focus { border-color: #c8aa6e; background: #2a2e35; box-shadow: 0 0 5px rgba(200, 170, 110, 0.3); }

        button { 
            width: 100%; padding: 15px; background: #1e2328; 
            color: #c8aa6e; border: 1px solid #c8aa6e; cursor: pointer;
            font-size: 18px; font-weight: bold; text-transform: uppercase;
            transition: all 0.3s ease; letter-spacing: 2px;
        }
        button:hover { background: #c8aa6e; color: #1e2328; box-shadow: 0 0 20px rgba(200, 170, 110, 0.5); }

        /* 결과 화면 레이아웃 */
        .match-wrap { display: flex; justify-content: space-between; gap: 30px; display: none; margin-top: 20px; }
        .team-box { flex: 1; border: 1px solid #5b5a56; background: rgba(0, 0, 0, 0.7); position: relative; }
        
        .team-header { padding: 15px; text-align: center; font-size: 20px; font-weight: bold; letter-spacing: 3px; background: rgba(255,255,255,0.03); }
        .blue-side { border-top: 5px solid #0097e6; box-shadow: 0 0 15px rgba(0, 151, 230, 0.2); }
        .red-side { border-top: 5px solid #e84118; box-shadow: 0 0 15px rgba(232, 65, 24, 0.2); }
        
        .blue-side .team-header { color: #0097e6; }
        .red-side .team-header { color: #e84118; }

        .player-row { 
            display: flex; align-items: center; padding: 12px 20px; 
            border-bottom: 1px solid #3c3c41;
        }
        .player-row:last-child { border-bottom: none; }

        /* 포지션 뱃지 - 크기 및 텍스트 맞춤 수정 */
        .pos-badge { 
            width: 85px; /* 너비를 충분히 확보 */
            height: 28px;
            font-size: 11px; font-weight: bold; color: #a09b8c;
            border: 1px solid #5b5a56; 
            display: flex; align-items: center; justify-content: center; /* 텍스트 중앙 정렬 */
            margin-right: 20px; background: #1e2328;
            letter-spacing: 1px;
            flex-shrink: 0; /* 박스 크기 유지 */
        }
        
        .player-name { font-size: 18px; color: #cdbe91; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 애니메이션 */
        .fade-in { animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 600px) {
            .input-grid { grid-template-columns: 1fr 1fr; }
            .match-wrap { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Custom Matchmaking</h1>
    
    <div class="input-section">
        <div class="input-grid" id="inputGrid"></div>
        <button onclick="generateMatch()">Start Random Draft</button>
    </div>

    <div id="matchWrap" class="match-wrap">
        <div class="team-box blue-side" id="blueBox">
            <div class="team-header">BLUE TEAM</div>
            <div id="blueTeamList"></div>
        </div>
        <div class="team-box red-side" id="redBox">
            <div class="team-header">RED TEAM</div>
            <div id="redTeamList"></div>
        </div>
    </div>
</div>

<script>
    const POSITIONS = ["TOP", "JUNGLE", "MIDDLE", "BOTTOM", "SUPPORT"];

    const grid = document.getElementById('inputGrid');
    for(let i=1; i<=10; i++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'p-input';
        input.placeholder = `Summoner ${i}`;
        input.value = `플레이어 ${i}`; 
        grid.appendChild(input);
    }

    function generateMatch() {
        const inputs = document.querySelectorAll('.p-input');
        let players = Array.from(inputs).map(i => i.value.trim() || "Unknown");

        for (let i = players.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [players[i], players[j]] = [players[j], players[i]];
        }

        renderTeam('blueTeamList', players.slice(0, 5));
        renderTeam('redTeamList', players.slice(5, 10));

        const wrap = document.getElementById('matchWrap');
        wrap.style.display = 'flex';
        
        // 애니메이션 재트리거
        document.getElementById('blueBox').classList.remove('fade-in');
        document.getElementById('redBox').classList.remove('fade-in');
        void wrap.offsetWidth; 
        document.getElementById('blueBox').classList.add('fade-in');
        document.getElementById('redBox').classList.add('fade-in');
    }

    function renderTeam(id, playerList) {
        const target = document.getElementById(id);
        target.innerHTML = "";
        
        POSITIONS.forEach((pos, idx) => {
            const html = `
                <div class="player-row">
                    <div class="pos-badge">${pos}</div>
                    <div class="player-name">${playerList[idx]}</div>
                </div>
            `;
            target.innerHTML += html;
        });
    }
</script>

</body>
</html>
