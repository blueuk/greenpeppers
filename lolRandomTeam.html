<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOL CUSTOM - DOUBLE GACHA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background: radial-gradient(circle, #0a1428 0%, #010a13 100%); 
            color: #f0e6d2; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 1000px; z-index: 1; }
        h1 { text-align: center; color: #c8aa6e; letter-spacing: 5px; border-bottom: 2px solid #c89b3c; padding-bottom: 10px; margin-bottom: 20px; }

        .section-box { background: rgba(1, 10, 19, 0.9); border: 1px solid #5b5a56; padding: 20px; margin-bottom: 20px; }
        .section-title { color: #a09b8c; font-size: 14px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; border-left: 3px solid #c8aa6e; padding-left: 10px; }

        .pool-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .member-chip { 
            background: #1e2328; border: 1px solid #5b5a56; color: #cdbe91; padding: 6px 12px; cursor: pointer;
            transition: 0.2s; font-size: 13px; border-radius: 2px;
        }
        .member-chip.selected { border-color: #c8aa6e; background: #c8aa6e; color: #1e2328; opacity: 0.4; pointer-events: none; }

        .custom-input-area { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid #3c3c41; padding-top: 15px; }
        .custom-input-area input { flex: 1; background: #1e2328; border: 1px solid #5b5a56; color: #f0e6d2; padding: 10px; outline: none; }
        .add-btn { background: #1e2328; color: #c8aa6e; border: 1px solid #c8aa6e; padding: 0 20px; cursor: pointer; font-weight: bold; }

        .entry-grid { display: grid; grid-template-columns: repeat(5, 2fr); gap: 10px; }
        .entry-slot { height: 45px; background: #0a1428; border: 1px solid #5b5a56; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #f0e6d2; font-size: 14px; }
        .entry-slot.filled { border-color: #c8aa6e; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 30px; }
        .start-btn { flex: 4; padding: 15px; background: #1e2328; color: #c8aa6e; border: 1px solid #c8aa6e; cursor: pointer; font-size: 18px; font-weight: bold; }
        .start-btn:hover:not(:disabled) { background: #c8aa6e; color: #1e2328; box-shadow: 0 0 20px rgba(200, 170, 110, 0.4); }
        .start-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .reset-btn { flex: 1; border: 1px solid #e84118; color: #e84118; background: transparent; cursor: pointer; font-weight: bold; }

        .match-wrap { display: none; justify-content: space-between; gap: 30px; margin-top: 10px; }
        .team-box { flex: 1; border: 1px solid #5b5a56; background: rgba(0, 0, 0, 0.8); }
        .team-header { padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
        .blue-side { border-top: 5px solid #0097e6; }
        .red-side { border-top: 5px solid #e84118; }
        .player-row { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid #3c3c41; opacity: 0; }
        .player-row.reveal { opacity: 1; transition: 0.5s; }
        .pos-badge { width: 85px; height: 28px; font-size: 11px; font-weight: bold; color: #a09b8c; border: 1px solid #5b5a56; display: flex; align-items: center; justify-content: center; margin-right: 20px; background: #1e2328; }

        /* --- 와이드 가챠 모달 스타일 --- */
        #modalOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: none;
            justify-content: center; align-items: center; z-index: 100;
        }
        .pachinko-card {
            background: #010a13; border: 2px solid #c89b3c; 
            width: 90%; max-width: 1200px; height: 450px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 70px rgba(200, 170, 110, 0.3); position: relative;
        }
        .modal-team-label { position: absolute; top: 30px; font-size: 28px; font-weight: bold; letter-spacing: 5px; }
        
        /* 룰렛 섹션 */
        .roulette-section { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 40px;}
        .roulette-label { color: #a09b8c; font-size: 16px; letter-spacing: 2px; }
        
        .slot-display {
            font-size: 60px; font-weight: bold; color: #f0e6d2; 
            height: 90px; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s; width: 100%; text-align: center;
        }
        .slot-display.fixed { color: #c8aa6e; transform: scale(1.1); text-shadow: 0 0 30px rgba(200, 170, 110, 0.8); }
        .slot-display.waiting { opacity: 0.2; filter: blur(2px); }

        .divider { width: 60%; height: 1px; background: #3c3c41; margin: 20px 0; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="pachinko-card">
        <div id="modalTeam" class="modal-team-label">BLUE TEAM</div>
        
        <div class="roulette-section">
            <div class="roulette-label">SUMMONER</div>
            <div id="nameSlot" class="slot-display">---</div>
        </div>

        <div class="divider"></div>

        <div class="roulette-section">
            <div class="roulette-label">POSITION</div>
            <div id="posSlot" class="slot-display waiting">---</div>
        </div>
    </div>
</div>

<div class="container">
    <h1>Custom Matchmaking</h1>

    <div class="section-box">
        <div class="section-title">Summoner Selection</div>
        <div class="pool-grid" id="poolGrid"></div>
        <div class="custom-input-area">
            <input type="text" id="customName" placeholder="새로운 소환사 이름 입력..." onkeypress="if(event.keyCode==13) addCustomPlayer()">
            <button class="add-btn" onclick="addCustomPlayer()">ADD</button>
        </div>
    </div>

    <div class="section-box">
        <div class="section-title">Selected Roster (<span id="count">0</span> / 10)</div>
        <div class="entry-grid" id="entryGrid"></div>
    </div>

    <div class="btn-group">
        <button id="resetBtn" class="reset-btn" onclick="resetAll()">RESET</button>
        <button id="startBtn" class="start-btn" onclick="generateMatch()" disabled>START DRAFT</button>
    </div>

    <div id="matchWrap" class="match-wrap">
        <div class="team-box blue-side">
            <div class="team-header">BLUE TEAM</div>
            <div id="blueTeamList"></div>
        </div>
        <div class="team-box red-side">
            <div class="team-header">RED TEAM</div>
            <div id="redTeamList"></div>
        </div>
    </div>
</div>

<script>
    const DEFAULT_MEMBERS = [
        "민준국", "이아니스", "최빛누리", "골드레이", "귀요미 상우", 
        "나도너도속는무빙", "대 파", "로밍과 줄리엣", "바린이", "배시시시", 
        "성일짱", "아메리칸 프로그", "여기 쓸쓸함 한잔 주시오", "임쏘은", 
        "조즈리얼", "증오는 빼는 편이야", "지나가는루돌프", "태구리", "해운대구보안관"
    ];
    let selectedPlayers = [];

    function init() {
        const poolGrid = document.getElementById('poolGrid');
        DEFAULT_MEMBERS.forEach(name => {
            const chip = document.createElement('div');
            chip.className = 'member-chip';
            chip.innerText = name;
            chip.onclick = () => togglePlayer(name);
            poolGrid.appendChild(chip);
        });
        const entryGrid = document.getElementById('entryGrid');
        for(let i=0; i<10; i++) {
            const slot = document.createElement('div');
            slot.className = 'entry-slot';
            slot.id = `slot-${i}`;
            entryGrid.appendChild(slot);
        }
    }

    function togglePlayer(name) {
        if (selectedPlayers.includes(name)) {
            selectedPlayers = selectedPlayers.filter(p => p !== name);
        } else if (selectedPlayers.length < 10) {
            selectedPlayers.push(name);
        }
        updateUI();
    }

    function addCustomPlayer() {
        const input = document.getElementById('customName');
        const name = input.value.trim();
        if (name && !selectedPlayers.includes(name) && selectedPlayers.length < 10) {
            selectedPlayers.push(name);
            input.value = "";
            updateUI();
        }
    }

    function updateUI() {
        document.querySelectorAll('.member-chip').forEach(chip => {
            chip.classList.toggle('selected', selectedPlayers.includes(chip.innerText));
        });
        for(let i=0; i<10; i++) {
            const slot = document.getElementById(`slot-${i}`);
            slot.innerText = selectedPlayers[i] || "";
            slot.classList.toggle('filled', !!selectedPlayers[i]);
        }
        document.getElementById('count').innerText = selectedPlayers.length;
        document.getElementById('startBtn').disabled = selectedPlayers.length !== 10;
        document.getElementById('startBtn').innerText = "START DRAFT";
    }

    function resetAll() {
        selectedPlayers = [];
        updateUI();
        document.getElementById('matchWrap').style.display = 'none';
        document.getElementById('blueTeamList').innerHTML = "";
        document.getElementById('redTeamList').innerHTML = "";
    }

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    async function generateMatch() {
        const startBtn = document.getElementById('startBtn');
        const modal = document.getElementById('modalOverlay');
        const blueList = document.getElementById('blueTeamList');
        const redList = document.getElementById('redTeamList');

        startBtn.disabled = true;
        blueList.innerHTML = "";
        redList.innerHTML = "";
        document.getElementById('matchWrap').style.display = 'flex';

        // 이번 세션에 사용할 플레이어 복사본 및 포지션 리스트
        let remainingPlayers = [...selectedPlayers];
        let bluePosLeft = ["TOP", "JUNGLE", "MIDDLE", "BOTTOM", "SUPPORT"];
        let redPosLeft = ["TOP", "JUNGLE", "MIDDLE", "BOTTOM", "SUPPORT"];

        modal.style.display = 'flex';

        // 팀당 5명씩 총 10번의 룰렛
        for (let i = 0; i < 5; i++) {
            // 블루팀 차례
            const bRes = await runDoublePachinko("BLUE TEAM", remainingPlayers, bluePosLeft, "#0097e6");
            remainingPlayers = remainingPlayers.filter(p => p !== bRes.name);
            bluePosLeft = bluePosLeft.filter(p => p !== bRes.pos);
            addPlayerRow(blueList, bRes.pos, bRes.name);
            await sleep(300);

            // 레드팀 차례
            const rRes = await runDoublePachinko("RED TEAM", remainingPlayers, redPosLeft, "#e84118");
            remainingPlayers = remainingPlayers.filter(p => p !== rRes.name);
            redPosLeft = redPosLeft.filter(p => p !== rRes.pos);
            addPlayerRow(redList, rRes.pos, rRes.name);
            await sleep(300);
        }

        modal.style.display = 'none';
        startBtn.disabled = false;
        startBtn.innerText = "🔄 RE-ROLL DRAFT";
    }

    async function runDoublePachinko(teamName, currentPlayers, currentPositions, color) {
        const teamLabel = document.getElementById('modalTeam');
        const nameSlot = document.getElementById('nameSlot');
        const posSlot = document.getElementById('posSlot');

        // 초기화
        teamLabel.innerText = teamName;
        teamLabel.style.color = color;
        nameSlot.classList.remove('fixed');
        posSlot.classList.remove('fixed');
        posSlot.classList.add('waiting');
        posSlot.innerText = "---";

        // 1단계: 닉네임 룰렛
        for(let j=0; j<12; j++) {
            nameSlot.innerText = currentPlayers[Math.floor(Math.random() * currentPlayers.length)];
            await sleep(j * 10 + 30);
        }
        const finalName = currentPlayers[Math.floor(Math.random() * currentPlayers.length)];
        nameSlot.innerText = finalName;
        nameSlot.classList.add('fixed');
        await sleep(500); // 닉네임 확정 후 잠시 대기

        // 2단계: 포지션 룰렛
        posSlot.classList.remove('waiting');
        for(let j=0; j<12; j++) {
            posSlot.innerText = currentPositions[Math.floor(Math.random() * currentPositions.length)];
            await sleep(j * 10 + 30);
        }
        const finalPos = currentPositions[Math.floor(Math.random() * currentPositions.length)];
        posSlot.innerText = finalPos;
        posSlot.classList.add('fixed');

        await sleep(1000); // 최종 결과 1초간 보여주기

        return { name: finalName, pos: finalPos };
    }

    function addPlayerRow(container, pos, name) {
        // 포지션 순서대로 삽입하기 위한 로직 (옵션)
        const order = {"TOP":0, "JUNGLE":1, "MIDDLE":2, "BOTTOM":3, "SUPPORT":4};
        const row = document.createElement('div');
        row.className = 'player-row';
        row.dataset.posOrder = order[pos];
        row.innerHTML = `<div class="pos-badge">${pos}</div><div class="player-name">${name}</div>`;
        
        container.appendChild(row);
        
        // 추가된 후 포지션 순서에 맞게 정렬 (실시간 정렬)
        const rows = Array.from(container.querySelectorAll('.player-row'));
        rows.sort((a, b) => a.dataset.posOrder - b.dataset.posOrder);
        rows.forEach(r => container.appendChild(r));

        setTimeout(() => row.classList.add('reveal'), 10);
    }

    init();
</script>

</body>
</html>
