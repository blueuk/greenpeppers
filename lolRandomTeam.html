<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>롤 포지션 배정기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #1a2a6c; }
        .input-group { margin-bottom: 20px; }
        input { width: calc(100% - 22px); padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .result-area { margin-top: 30px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background-color: #f8f9fa; color: #555; }
        .pos { font-weight: bold; color: #007bff; width: 40%; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎮 포지션 랜덤 배정</h2>
    
    <div class="input-group">
        <p>플레이어 5명의 이름을 입력하세요:</p>
        <input type="text" class="player" placeholder="플레이어 1" value="소환사1">
        <input type="text" class="player" placeholder="플레이어 2" value="소환사2">
        <input type="text" class="player" placeholder="플레이어 3" value="소환사3">
        <input type="text" class="player" placeholder="플레이어 4" value="소환사4">
        <input type="text" class="player" placeholder="플레이어 5" value="소환사5">
    </div>

    <button onclick="assignPositions()">포지션 배정하기!</button>

    <div id="result" class="result-area">
        <h3 id="teamName"></h3>
        <table>
            <thead>
                <tr>
                    <th>포지션</th>
                    <th>이름</th>
                </tr>
            </thead>
            <tbody id="resultBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    function assignPositions() {
        const positions = ["탑", "정글", "미드", "원딜", "서폿"];
        const inputs = document.querySelectorAll('.player');
        let players = Array.from(inputs).map(input => input.value.trim() || "익명");

        // 1. 플레이어 순서를 무작위로 섞음 (피셔-예이츠 셔플)
        for (let i = players.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [players[i], players[j]] = [players[j], players[i]];
        }

        // 2. 팀 랜덤 결정 (1팀 또는 2팀)
        const teamNum = Math.floor(Math.random() * 2) + 1;
        
        // 3. 화면 업데이트
        const resultBody = document.getElementById('resultBody');
        const teamName = document.getElementById('teamName');
        resultBody.innerHTML = "";
        teamName.innerText = `✨ ${teamNum}팀 배정 결과`;

        positions.forEach((pos, index) => {
            const row = `<tr>
                <td class="pos">${pos}</td>
                <td>${players[index]}</td>
            </tr>`;
            resultBody.innerHTML += row;
        });

        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
