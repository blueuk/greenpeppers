<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOL CUSTOM - PRO DRAFT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background: radial-gradient(circle, #0a1428 0%, #010a13 100%); color: #f0e6d2; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1000px; }
        h1 { text-align: center; color: #c8aa6e; letter-spacing: 5px; border-bottom: 2px solid #c89b3c; padding-bottom: 10px; }
        .version { font-size: 0.9rem; color: #777; margin-top: 5px; }
        .section-box { background: rgba(1, 10, 19, 0.9); border: 1px solid #5b5a56; padding: 20px; margin-bottom: 20px; }
        .pool-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .member-chip { background: #1e2328; border: 1px solid #5b5a56; color: #cdbe91; padding: 6px 12px; cursor: pointer; transition: 0.2s; }
        .member-chip.selected { border-color: #c8aa6e; background: #c8aa6e; color: #1e2328; }
        .entry-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; }
        .entry-slot { height: 40px; border: 1px solid #5b5a56; display: flex; align-items: center; justify-content: center; background: #0a1428; }
        .entry-slot.filled { border-color: #c8aa6e; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 15px 30px; cursor: pointer; font-weight: bold; border: none; }
        .start-btn { background: #c8aa6e; color: #010a13; flex: 3; }
        .reset-btn { background: transparent; border: 1px solid #e84118; color: #e84118; flex: 1; }
        
        #modalOverlay { position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .roulette-container { display: flex; flex-direction: column; gap: 30px; }
        .slot { font-size: 3rem; font-weight: bold; color: #555; height: 80px; width: 600px; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #333; transition: 0.3s; }
        .slot.active { color: #c8aa6e; }
        
        @keyframes fanfare { 0% { transform: scale(1); } 50% { transform: scale(1.1); color: #ffd700; } 100% { transform: scale(1); } }
        .fanfare { animation: fanfare 0.5s ease; }

        .match-wrap { display: none; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .team-box { border: 1px solid #5b5a56; padding: 15px; background: #0a1428; }
        .player-row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #3c3c41; }
        .badge { width: 70px; font-size: 0.8rem; font-weight: bold; padding: 4px; border: 1px solid #5b5a56; margin-right: 15px; text-align: center; background: #1e2328; color: #cdbe91; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="roulette-container">
        <div id="slot-team" class="slot">팀 배정 중...</div>
        <div id="slot-name" class="slot">닉네임 배정 중...</div>
        <div id="slot-pos" class="slot">포지션 배정 중...</div>
    </div>
</div>

<div class="container">
    <h1>Custom Matchmaking <div class="version">v2.0.6 (PRO DRAFT)</div></h1>
    <div class="section-box">
        <div class="pool-grid" id="poolGrid"></div>
        <div class="entry-grid" id="entryGrid"></div>
    </div>
    <div class="btn-group">
        <button class="reset-btn" onclick="location.reload()">RESET ALL</button>
        <button id="startBtn" class="start-btn" onclick="startDraft()" disabled>START DRAFT</button>
    </div>
    <div id="matchWrap" class="match-wrap">
        <div class="team-box" id="blueTeam"><div style="color:#0097e6; font-weight:bold; margin-bottom:10px;">BLUE TEAM</div></div>
        <div class="team-box" id="redTeam"><div style="color:#e84118; font-weight:bold; margin-bottom:10px;">RED TEAM</div></div>
    </div>
</div>

<script>
    const MEMBERS = ["민준국", "이아니스", "최빛누리", "골드레이", "귀요미 상우", "나도너도속는무빙", "대 파", "로밍과 줄리엣", "바린이", "배시시시", "성일짱", "아메리칸 프로그", "여기 쓸쓸함 한잔 주시오", "임쏘은", "조즈리얼", "증오는 빼는 편이야", "지나가는루돌프", "태구리", "해운대구보안관"];
    let selected = [];
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    function init() {
        const grid = document.getElementById('poolGrid');
        MEMBERS.forEach(m => {
            const div = document.createElement('div'); div.className = 'member-chip'; div.innerText = m;
            div.onclick = () => { if(selected.includes(m)) selected = selected.filter(x => x !== m); else if(selected.length < 10) selected.push(m); updateUI(); };
            grid.appendChild(div);
        });
        for(let i=0; i<10; i++) { const slot = document.createElement('div'); slot.className = 'entry-slot'; slot.id = `slot-${i}`; document.getElementById('entryGrid').appendChild(slot); }
    }

    function updateUI() {
        document.querySelectorAll('.member-chip').forEach(c => c.classList.toggle('selected', selected.includes(c.innerText)));
        for(let i=0; i<10; i++) { const s = document.getElementById(`slot-${i}`); s.innerText = selected[i] || ""; s.classList.toggle('filled', !!selected[i]); }
        document.getElementById('startBtn').disabled = selected.length !== 10;
    }

    async function runSlot(elementId, items, color, remainingCount) {
        const el = document.getElementById(elementId);
        el.classList.add('active');
        let delay = Math.max(10, remainingCount * 5);
        for(let i=0; i<15; i++) {
            el.innerText = items.length > 0 ? items[Math.floor(Math.random() * items.length)] : "---";
            await sleep(delay);
            delay += 20; 
        }
        const result = items.length > 0 ? items[Math.floor(Math.random() * items.length)] : "NONE";
        el.innerText = result;
        el.style.color = color;
        return result;
    }

    async function startDraft() {
        // 리롤 시 결과창 초기화
        document.getElementById('blueTeam').innerHTML = '<div style="color:#0097e6; font-weight:bold; margin-bottom:10px;">BLUE TEAM</div>';
        document.getElementById('redTeam').innerHTML = '<div style="color:#e84118; font-weight:bold; margin-bottom:10px;">RED TEAM</div>';

        document.getElementById('modalOverlay').style.display = 'flex';
        document.getElementById('matchWrap').style.display = 'grid';
        let pool = [...selected], bluePos = ["TOP", "JUNGLE", "MID", "BOT", "SUP"], redPos = ["TOP", "JUNGLE", "MID", "BOT", "SUP"];
        let bCount = 0, rCount = 0;

        for(let i=10; i > 0; i--) {
            document.querySelectorAll('.slot').forEach(s => { s.innerText = "---"; s.style.color = "#555"; s.classList.remove('fanfare'); });

            // 1. 팀 선정
            let team = (bCount >= 5) ? "RED TEAM" : (rCount >= 5) ? "BLUE TEAM" : await runSlot('slot-team', ["BLUE TEAM", "RED TEAM"], "#fff", i);
            const teamColor = (team === "BLUE TEAM") ? "#0097e6" : "#e84118";
            document.getElementById('slot-team').innerText = team;
            document.getElementById('slot-team').style.color = teamColor;
            
            if(team === "BLUE TEAM") bCount++; else rCount++;
            await sleep(1000);

            // 2. 닉네임 선정
            const name = await runSlot('slot-name', pool, "#fff", i);
            pool = pool.filter(x => x !== name);
            await sleep(1000);

            // 3. 포지션 선정
            const posList = (team === "BLUE TEAM" ? bluePos : redPos);
            const pos = await runSlot('slot-pos', posList, teamColor, i);
            if(team === "BLUE TEAM") bluePos = bluePos.filter(x => x !== pos); else redPos = redPos.filter(x => x !== pos);
            
            // 배정 완료 팡파레
            document.querySelectorAll('.slot').forEach(s => s.classList.add('fanfare'));
            await sleep(1500);

            document.getElementById(team === "BLUE TEAM" ? 'blueTeam' : 'redTeam').innerHTML += 
                `<div class="player-row" style="color:${teamColor}"><div class="badge">${pos}</div>${name}</div>`;
        }
        document.getElementById('modalOverlay').style.display = 'none';
        document.getElementById('startBtn').innerText = "RE-ROLL DRAFT";
    }

    init();
</script>
</body>
</html>
