<div id="member-view" class="section">
    <div class="card">
        <select id="member-select" onchange="loadMemberInfo()">
            <option value="">멤버 선택</option>
        </select>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <div id="chart-container" style="width: 100%; max-width: 500px; margin: 20px auto; display: none;">
                <canvas id="memberChart"></canvas>
        </div>
        <div id="member-detail" class="info-grid"></div>
        <div id="edit-actions" style="display: flex; gap: 10px; margin-top: 10px;">
            <button id="edit-btn" class="btn btn-outline" style="display:none; flex: 2;" onclick="toggleEditMode()">정보 수정하기</button>
            <button id="cancel-btn" class="btn" style="display:none; flex: 1; background: var(--toss-gray);" onclick="cancelEdit()">취소</button>
        </div>
    </div>
</div>
