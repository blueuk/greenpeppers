<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOL CUSTOM - ULTIMATE GACHA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

        body { font-family: 'Noto Sans KR', sans-serif; background: #010a13; color: #f0e6d2; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1000px; }
        h1 { text-align: center; color: #c8aa6e; letter-spacing: 5px; border-bottom: 2px solid #c89b3c; padding-bottom: 10px; }
        
        /* 기존 UI 스타일 유지 */
        .section-box { background: rgba(1, 10, 19, 0.9); border: 1px solid #5b5a56; padding: 20px; margin-bottom: 20px; }
        .pool-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .member-chip { background: #1e2328; border: 1px solid #5b5a56; color: #cdbe91; padding: 6px 12px; cursor: pointer; }
        .member-chip.selected { border-color: #c8aa6e; background: #c8aa6e; color: #1e2328; }
        
        .start-btn { width: 100%; padding: 20px; background: #c8aa6e; color: #1e2328; font-weight: bold; font-size: 20px; cursor: pointer; border: none; }
        .match-wrap { display: flex; gap: 20px; margin-top: 20px; }
        .team-box { flex: 1; border: 1px solid #5b5a56; padding: 10px; }

        /* 3단계 룰렛 모달 */
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: none; justify-content: center; align-items: center; z-index: 100; }
        .pachinko-card { background: #010a13; border: 2px solid #c89b3c; width: 90%; max-width: 800px; padding: 40px; text-align: center; }
        .slot-display { font-size: 40px; font-weight: bold; margin: 20px 0; color: #c8aa6e; height: 60px; }
        .label { color: #a09b8c; font-size: 14px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="pachinko-card">
        <div class="label">Step 1: Team</div>
        <div id="teamSlot" class="slot-display">---</div>
        <div class="label">Step 2: Summoner</div>
        <div id="nameSlot" class="slot-display">---</div>
        <div class="label">Step 3: Position</div>
        <div id="posSlot" class="slot-display">---</div>
    </div>
</div>

<div class="container">
    <h1>Custom Matchmaking</h1>
    <div class="section-box">
        <div class="pool-grid" id="poolGrid"></div>
    </div>
    <button id="startBtn" class="start-btn" onclick="startDraft()" disabled>START ULTIMATE DRAFT</button>
    <div class="match-wrap" id="matchWrap" style="display:none;">
        <div class="team-box" id="blueTeamList"><h3>BLUE</h3></div>
        <div class="team-box" id="redTeamList"><h3>RED</h3></div>
    </div>
</div>

<script>
    const DEFAULT_MEMBERS = ["민준국", "이아니스", "최빛누리", "골드레이", "귀요미 상우", "나도너도속는무빙", "대 파", "로밍과 줄리엣", "바린이", "배시시시"];
    let selectedPlayers = [];

    // 초기화
    DEFAULT_MEMBERS.forEach(name => {
        const chip = document.createElement('div');
        chip.className = 'member-chip';
        chip.innerText = name;
        chip.onclick = (e) => {
            if(selectedPlayers.includes(name)) selectedPlayers = selectedPlayers.filter(p => p !== name);
            else if(selectedPlayers.length < 10) selectedPlayers.push(name);
            e.target.classList.toggle('selected');
            document.getElementById('startBtn').disabled = selectedPlayers.length !== 10;
        };
        document.getElementById('poolGrid').appendChild(chip);
    });

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    async function startDraft() {
        document.getElementById('modalOverlay').style.display = 'flex';
        let players = [...selectedPlayers];
        let blueTeam = [], redTeam = [];
        let bluePos = ["TOP", "JNG", "MID", "BOT", "SUP"];
        let redPos = ["TOP", "JNG", "MID", "BOT", "SUP"];

        for(let i=0; i<10; i++) {
            // 1. 팀 결정 (인원수 체크)
            let team = (blueTeam.length < 5 && (redTeam.length === 5 || Math.random() > 0.5)) ? "BLUE" : "RED";
            
            // 2. 닉네임 결정
            let pIdx = Math.floor(Math.random() * players.length);
            let name = players.splice(pIdx, 1)[0];

            // 3. 포지션 결정
            let posList = (team === "BLUE") ? bluePos : redPos;
            let posIdx = Math.floor(Math.random() * posList.length);
            let pos = posList.splice(posIdx, 1)[0];

            // 룰렛 연출
            await runRoulette(team, name, pos);
            
            // 결과 추가
            let div = document.createElement('div');
            div.innerText = `${pos} | ${name}`;
            document.getElementById(team === "BLUE" ? 'blueTeamList' : 'redTeamList').appendChild(div);
        }
        document.getElementById('modalOverlay').style.display = 'none';
        document.getElementById('matchWrap').style.display = 'flex';
    }

    async function runRoulette(t, n, p) {
        const ts = document.getElementById('teamSlot'), ns = document.getElementById('nameSlot'), ps = document.getElementById('posSlot');
        for(let i=0; i<10; i++) {
            ts.innerText = Math.random() > 0.5 ? "BLUE" : "RED";
            ns.innerText = selectedPlayers[Math.floor(Math.random()*10)];
            ps.innerText = ["TOP","JNG","MID","BOT","SUP"][Math.floor(Math.random()*5)];
            await sleep(50);
        }
        ts.innerText = t; ns.innerText = n; ps.innerText = p;
        await sleep(800);
    }
</script>
</body>
</html>
