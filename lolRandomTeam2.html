<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOL CUSTOM - PRO DRAFT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background: radial-gradient(circle, #0a1428 0%, #010a13 100%); color: #f0e6d2; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1000px; }
        #modalOverlay { position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        
        /* 팡파레 효과 */
        @keyframes fanfare { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); color: #ffd700; } 100% { transform: scale(1); opacity: 1; } }
        .fanfare { animation: fanfare 0.5s ease; color: #ffd700; }

        .slot { font-size: 3rem; font-weight: bold; color: #555; height: 80px; width: 600px; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #333; }
        .slot.active { color: #c8aa6e; }
        
        .match-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .team-box { border: 1px solid #5b5a56; padding: 15px; background: #0a1428; }
        .player-row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #3c3c41; }
        .badge { width: 70px; font-weight: bold; padding: 4px; border: 1px solid #5b5a56; margin-right: 15px; text-align: center; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="roulette-container">
        <div id="slot-team" class="slot">팀 선택 중...</div>
        <div id="slot-name" class="slot">닉네임 선택 중...</div>
        <div id="slot-pos" class="slot">포지션 선택 중...</div>
    </div>
</div>

<div class="container">
    <h1>Custom Matchmaking 3.2</h1>
    <div id="poolGrid"></div> <button id="startBtn" onclick="startDraft()" disabled>START DRAFT</button>
    <div id="matchWrap" class="match-wrap">
        <div class="team-box" id="blueTeam"><div style="color:#0097e6">BLUE TEAM</div></div>
        <div class="team-box" id="redTeam"><div style="color:#e84118">RED TEAM</div></div>
    </div>
</div>

<script>
    const MEMBERS = ["민준국", "이아니스", "최빛누리", "골드레이", "귀요미 상우", "나도너도속는무빙", "대 파", "로밍과 줄리엣", "바린이", "배시시시", "성일짱", "아메리칸 프로그", "여기 쓸쓸함 한잔 주시오", "임쏘은", "조즈리얼", "증오는 빼는 편이야", "지나가는루돌프", "태구리", "해운대구보안관"];
    let selected = [];
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    // 남은 인원에 따라 속도 가변화 (인원 적을수록 더 빠름)
    async function runSlot(elementId, items, color, remainingCount) {
        const el = document.getElementById(elementId);
        el.classList.add('active');
        // 남은 인원이 적을수록(10->1) 기본 delay를 줄임 (빠르게 회전)
        let baseDelay = Math.max(10, remainingCount * 5); 
        let delay = baseDelay;
        
        for(let i=0; i<15; i++) {
            el.innerText = items.length > 0 ? items[Math.floor(Math.random() * items.length)] : "---";
            await sleep(delay);
            delay += 20; 
        }
        const result = items.length > 0 ? items[Math.floor(Math.random() * items.length)] : "NONE";
        el.innerText = result;
        el.style.color = color || "#c8aa6e";
        return result;
    }

    async function startDraft() {
        document.getElementById('modalOverlay').style.display = 'flex';
        let pool = [...selected], bluePos = ["TOP", "JUNGLE", "MID", "BOT", "SUP"], redPos = [...bluePos];
        let bCount = 0, rCount = 0;

        for(let i=10; i > 0; i--) {
            document.querySelectorAll('.slot').forEach(s => { s.innerText = "---"; s.style.color = "#555"; s.classList.remove('fanfare'); });

            // 1. 팀 선정
            let team = (bCount >= 5) ? "RED TEAM" : (rCount >= 5) ? "BLUE TEAM" : await runSlot('slot-team', ["BLUE TEAM", "RED TEAM"], "#fff", i);
            const color = (team === "BLUE TEAM") ? "#0097e6" : "#e84118";
            if(team === "BLUE TEAM") bCount++; else rCount++;
            await sleep(1000);

            // 2. 닉네임 선정
            const name = await runSlot('slot-name', pool, "#fff", i);
            pool = pool.filter(x => x !== name);
            await sleep(1000);

            // 3. 포지션 선정
            const posList = (team === "BLUE TEAM" ? bluePos : redPos);
            const pos = await runSlot('slot-pos', posList, color, i);
            if(team === "BLUE TEAM") bluePos = bluePos.filter(x => x !== pos); else redPos = redPos.filter(x => x !== pos);
            
            // 팡파레 효과 적용
            document.querySelectorAll('.slot').forEach(s => s.classList.add('fanfare'));
            await sleep(1500);

            document.getElementById(team === "BLUE TEAM" ? 'blueTeam' : 'redTeam').innerHTML += 
                `<div class="player-row" style="color:${color}"><div class="badge">${pos}</div>${name}</div>`;
        }
        document.getElementById('modalOverlay').style.display = 'none';
    }
</script>
</body>
</html>
