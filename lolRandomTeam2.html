<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LoL Ultimate Champion Slot</title>
    <style>
        :root {
            --hextech-gold: #c89b3c;
            --hextech-border: #785a28;
            --bg-dark: #010a13;
            --slot-height: 180px;
            --slot-width: 115px;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #f0e6d2;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            margin: 0;
            background-image: radial-gradient(circle, #0a1428 0%, #010a13 100%);
        }

        h1 { color: var(--hextech-gold); letter-spacing: 4px; margin-bottom: 5px; text-shadow: 0 0 15px rgba(200, 155, 60, 0.4); }
        .mode-indicator { color: #a0946e; margin-bottom: 25px; font-size: 0.9rem; font-weight: bold; }

        .main-wrapper { display: flex; flex-direction: column; gap: 20px; }

        .slot-row-panel {
            display: flex;
            flex-direction: column;
            background: rgba(5, 13, 22, 0.95);
            border: 2px solid var(--hextech-border);
            box-shadow: 0 0 30px rgba(0,0,0,1);
            padding: 12px;
            transition: all 0.4s ease;
        }

        .region-label {
            color: var(--hextech-gold);
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 10px;
            padding-left: 8px;
            letter-spacing: 1px;
            border-left: 3px solid var(--hextech-gold);
            text-transform: uppercase;
        }

        .slots-container { display: flex; gap: 10px; }

        .slot {
            width: var(--slot-width);
            height: var(--slot-height);
            background: #050d16;
            border: 1px solid #3c3c3c;
            overflow: hidden;
            position: relative;
        }

        .slot-inner { display: flex; flex-direction: column; will-change: transform; }

        .item {
            width: var(--slot-width);
            height: var(--slot-height);
            flex-shrink: 0;
            position: relative;
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
        }

        .champ-name {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            color: #fff; font-size: 11px; text-align: center;
            padding: 10px 0 5px 0; font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        .button-group { display: flex; gap: 15px; margin-top: 30px; }

        .draw-button {
            padding: 15px 40px; background: #1e2328;
            color: var(--hextech-gold); border: 2px solid var(--hextech-gold);
            cursor: pointer; font-size: 1rem; font-weight: bold;
            transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .draw-button:hover:not(:disabled) {
            background: var(--hextech-gold); color: #1e2328;
            box-shadow: 0 0 25px var(--hextech-gold);
        }

        .theme-btn { border-color: #00bcff; color: #00bcff; }
        .theme-btn:hover:not(:disabled) { background: #00bcff; color: #1e2328; box-shadow: 0 0 25px #00bcff; }

        .draw-button:disabled { opacity: 0.3; cursor: wait; transform: scale(0.98); }
    </style>
</head>
<body>

    <h1>CHAMPION SUMMONER</h1>
    <div class="mode-indicator" id="status-text">소환 방식을 선택하세요</div>

    <div class="main-wrapper" id="main-wrapper"></div>

    <div class="button-group">
        <button class="draw-button" onclick="launchSummon('all')">전체 랜덤 소환</button>
        <button class="draw-button theme-btn" onclick="launchSummon('regional')">지역 테마 소환</button>
    </div>

            {ko:"모데카이저", en:"Mordekaiser"}, {ko:"모르가나", en:"Morgana"}, {ko:"문도 박사", en:"DrMundo"}, {ko:"미스 포츈", en:"MissFortune"}, {ko:"밀리오", en:"Milio"},
            {ko:"바드", en:"Bard"}, {ko:"바루스", en:"Varus"}, {ko:"바이", en:"Vi"}, {ko:"베이가", en:"Veigar"}, {ko:"베인", en:"Vayne"},
            {ko:"벨코즈", en:"Velkoz"}, {ko:"벨베스", en:"Belveth"}, {ko:"볼리베어", en:"Volibear"}, {ko:"브라움", en:"Braum"}, {ko:"브랜드", en:"Brand"},
            {ko:"브라이어", en:"Briar"}, {ko:"블라디미르", en:"Vladimir"}, {ko:"블리츠크랭크", en:"Blitzcrank"}, {ko:"비에고", en:"Viego"}, {ko:"빅토르", en:"Viktor"},
            {ko:"뽀삐", en:"Poppy"}, {ko:"사미라", en:"Samira"}, {ko:"사이온", en:"Sion"}, {ko:"사일러스", en:"Sylas"}, {ko:"샤코", en:"Shaco"},
            {ko:"세나", en:"Senna"}, {ko:"세라핀", en:"Seraphine"}, {ko:"세주아니", en:"Sejuani"}, {ko:"세트", en:"Sett"}, {ko:"소나", en:"Sona"},
            {ko:"소라카", en:"Soraka"}, {ko:"쉔", en:"Shen"}, {ko:"쉬바나", en:"Shyvana"}, {ko:"스웨인", en:"Swain"}, {ko:"스카너", en:"Skarner"},
            {ko:"스몰더", en:"Smolder"}, {ko:"시비르", en:"Sivir"}, {ko:"신 짜오", en:"XinZhao"}, {ko:"신드라", en:"Syndra"}, {ko:"신지드", en:"Singed"},
            {ko:"쓰레쉬", en:"Thresh"}, {ko:"아리", en:"Ahri"}, {ko:"아무무", en:"Amumu"}, {ko:"아우솔", en:"AurelionSol"}, {ko:"아이번", en:"Ivern"},
            {ko:"아지르", en:"Azir"}, {ko:"아칼리", en:"Akali"}, {ko:"아크샨", en:"Akshan"}, {ko:"아트록스", en:"Aatrox"}, {ko:"아펠리오스", en:"Aphelios"},

            {ko:"야스오", en:"Yasuo"}, {ko:"에코", en:"Ekko"}, {ko:"엘리스", en:"Elise"}, {ko:"오공", en:"MonkeyKing"}, {ko:"오른", en:"Ornn"},
            {ko:"오리아나", en:"Orianna"}, {ko:"올라프", en:"Olaf"}, {ko:"요네", en:"Yone"}, {ko:"요릭", en:"Yorick"}, {ko:"우디르", en:"Udyr"},
            {ko:"우르곳", en:"Urgot"}, {ko:"워윅", en:"Warwick"}, {ko:"유미", en:"Yuumi"}, {ko:"이렐리아", en:"Irelia"}, {ko:"이브린", en:"Evelynn"},
            {ko:"이즈리얼", en:"Ezreal"}, {ko:"일라오이", en:"Illaoi"}, {ko:"자르반 4세", en:"JarvanIV"}, {ko:"자야", en:"Xayah"}, {ko:"자이라", en:"Zyra"},
            {ko:"자크", en:"Zac"}, {ko:"잔나", en:"Janna"}, {ko:"잭스", en:"Jax"}, {ko:"제드", en:"Zed"}, {ko:"제라스", en:"Xerath"},
            {ko:"제리", en:"Zeri"}, {ko:"제이스", en:"Jayce"}, {ko:"조이", en:"Zoe"}, {ko:"직스", en:"Ziggs"}, {ko:"진", en:"Jhin"},
            {ko:"질리언", en:"Zilean"}, {ko:"징크스", en:"Jinx"}, {ko:"초가스", en:"Chogath"}, {ko:"카르마", en:"Karma"}, {ko:"카밀", en:"Camille"},

            {ko:"칼리스타", en:"Kalista"}, {ko:"케넨", en:"Kennen"}, {ko:"케이틀린", en:"Caitlyn"}, {ko:"케인", en:"Kayn"}, {ko:"케일", en:"Kayle"},
            {ko:"코그모", en:"KogMaw"}, {ko:"코르키", en:"Corki"}, {ko:"크산테", en:"KSante"}, {ko:"퀸", en:"Quinn"}, {ko:"클레드", en:"Kled"},
            {ko:"키아나", en:"Qiyana"}, {ko:"킨드레드", en:"Kindred"}, {ko:"타릭", en:"Taric"}, {ko:"탈론", en:"Talon"}, {ko:"탈리야", en:"Taliyah"},
            {ko:"탐 켄치", en:"TahmKench"}, {ko:"트런들", en:"Trundle"}, {ko:"트리스타나", en:"Tristana"}, {ko:"트린다미어", en:"Tryndamere"},
            {ko:"트페", en:"TwistedFate"}, {ko:"트위치", en:"Twitch"}, {ko:"티모", en:"Teemo"}, {ko:"파이크", en:"Pyke"}, {ko:"판테온", en:"Pantheon"},
            {ko:"피들스틱", en:"Fiddlesticks"}, {ko:"피오라", en:"Fiora"}, {ko:"피즈", en:"Fizz"}, {ko:"하이머딩거", en:"Heimerdinger"},
            {ko:"헤카림", en:"Hecarim"}, {ko:"흐웨이", en:"Hwei"}
        ];

        const regions = [
            { name: "공허 (The Void)", champs: [{ko:"카이사", en:"Kaisa"}, {ko:"말자하", en:"Malzahar"}, {ko:"벨코즈", en:"Velkoz"}, {ko:"카직스", en:"Khazix"}, {ko:"렉사이", en:"RekSai"}, {ko:"벨베스", en:"Belveth"}]},
            { name: "필트오버 & 자운", champs: [{ko:"바이", en:"Vi"}, {ko:"징크스", en:"Jinx"}, {ko:"에코", en:"Ekko"}, {ko:"제이스", en:"Jayce"}, {ko:"케이틀린", en:"Caitlyn"}, {ko:"빅토르", en:"Viktor"}]},
            { name: "아이오니아", champs: [{ko:"아칼리", en:"Akali"}, {ko:"야스오", en:"Yasuo"}, {ko:"이렐리아", en:"Irelia"}, {ko:"리 신", en:"LeeSin"}, {ko:"아리", en:"Ahri"}, {ko:"제드", en:"Zed"}]},
            { name: "데마시아", champs: [{ko:"가렌", en:"Garen"}, {ko:"럭스", en:"Lux"}, {ko:"자르반 4세", en:"JarvanIV"}, {ko:"피오라", en:"Fiora"}, {ko:"갈리오", en:"Galio"}, {ko:"사일러스", en:"Sylas"}]},
            { name: "녹서스", champs: [{ko:"다리우스", en:"Darius"}, {ko:"드레이븐", en:"Draven"}, {ko:"카타리나", en:"Katarina"}, {ko:"스웨인", en:"Swain"}, {ko:"르블랑", en:"Leblanc"}, {ko:"모데카이저", en:"Mordekaiser"}]},
            { name: "슈리마", champs: [{ko:"아지르", en:"Azir"}, {ko:"나서스", en:"Nasus"}, {ko:"레넥톤", en:"Renekton"}, {ko:"시비르", en:"Sivir"}, {ko:"크산테", en:"KSante"}, {ko:"탈리야", en:"Taliyah"}]},
            { name: "그림자 군도", champs: [{ko:"비에고", en:"Viego"}, {ko:"쓰레쉬", en:"Thresh"}, {ko:"헤카림", en:"Hecarim"}, {ko:"칼리스타", en:"Kalista"}, {ko:"그웬", en:"Gwen"}, {ko:"카서스", en:"Karthus"}]},
            { name: "프렐요드", champs: [{ko:"애쉬", en:"Ashe"}, {ko:"세주아니", en:"Sejuani"}, {ko:"리산드라", en:"Lissandra"}, {ko:"브라움", en:"Braum"}, {ko:"볼리베어", en:"Volibear"}, {ko:"오른", en:"Ornn"}]}
        ];

        const wrapper = document.getElementById('main-wrapper');
        const itemHeight = 180;

        // 초기 화면 (4개 섹션 생성)
        for (let r = 0; r < 4; r++) {
            const rowPanel = document.createElement('div');
            rowPanel.className = 'slot-row-panel';
            rowPanel.innerHTML = `
                <div class="region-label" id="label-${r}">SQUAD ${r+1}</div>
                <div class="slots-container" id="container-${r}"></div>
            `;
            const container = rowPanel.querySelector('.slots-container');
            for (let s = 0; s < 5; s++) {
                const idx = (r * 5) + s;
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.innerHTML = `<div class="slot-inner" id="inner-${idx}"><div class="item" style="background-image:url('https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Aatrox_0.jpg')"><div class="champ-name">READY</div></div></div>`;
                container.appendChild(slot);
            }
            wrapper.appendChild(rowPanel);
        }

        function launchSummon(mode) {
            const btns = document.querySelectorAll('.draw-button');
            btns.forEach(b => b.disabled = true);
            
            let selectedRegions = [];
            if (mode === 'regional') {
                selectedRegions = [...regions].sort(() => 0.5 - Math.random()).slice(0, 4);
                document.getElementById('status-text').innerText = "지역 테마 소환: 4개의 세력이 응답했습니다!";
            } else {
                document.getElementById('status-text').innerText = "전체 랜덤 소환: 모든 챔피언이 소환 후보입니다!";
            }

            for (let r = 0; r < 4; r++) {
                let pool = [];
                if (mode === 'regional') {
                    pool = selectedRegions[r].champs;
                    const label = document.getElementById(`label-${r}`);
                    label.innerText = selectedRegions[r].name;
                    label.style.color = "#00bcff";
                    label.style.borderColor = "#00bcff";
                } else {
                    pool = allChampsPool;
                    const label = document.getElementById(`label-${r}`);
                    label.innerText = `RANDOM SQUAD ${r+1}`;
                    label.style.color = "var(--hextech-gold)";
                    label.style.borderColor = "var(--hextech-gold)";
                }

                for (let s = 0; s < 5; s++) {
                    const slotIdx = (r * 5) + s;
                    const inner = document.getElementById(`inner-${slotIdx}`);
                    inner.innerHTML = '';
                    
                    const scrollCount = 20;
                    const resultChamp = pool[Math.floor(Math.random() * pool.length)];

                    for(let j=0; j <= scrollCount; j++) {
                        const champ = (j === scrollCount) ? resultChamp : allChampsPool[Math.floor(Math.random() * allChampsPool.length)];
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.style.backgroundImage = `url('https://ddragon.leagueoflegends.com/cdn/img/champion/loading/${champ.en}_0.jpg')`;
                        div.innerHTML = `<div class="champ-name">${champ.ko}</div>`;
                        inner.appendChild(div);
                    }

                    inner.style.transition = 'none';
                    inner.style.transform = `translateY(0)`;

                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            const duration = 2.5 + (Math.random() * 1.5); 
                            inner.style.transition = `transform ${duration}s cubic-bezier(0.1, 0, 0.1, 1)`;
                            inner.style.transform = `translateY(-${scrollCount * itemHeight}px)`;
                        });
                    });
                }
            }
            setTimeout(() => { btns.forEach(b => b.disabled = false); }, 4500);
        }
    </script>
</body>
</html>
