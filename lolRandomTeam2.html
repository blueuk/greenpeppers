<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOL CUSTOM - DRAFT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background: radial-gradient(circle, #0a1428 0%, #010a13 100%); color: #f0e6d2; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1000px; }
        #modalOverlay { position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        
        /* 3단 슬롯 스타일 */
        .roulette-container { display: flex; flex-direction: column; gap: 20px; text-align: center; }
        .slot { font-size: 3rem; font-weight: bold; color: #555; height: 80px; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #333; }
        .slot.active { color: #c8aa6e; }
        
        .match-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .team-box { border: 1px solid #5b5a56; padding: 15px; background: #0a1428; }
        .player-row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #3c3c41; }
        .badge { width: 70px; font-weight: bold; padding: 4px; border: 1px solid #5b5a56; margin-right: 15px; text-align: center; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="roulette-container">
        <div id="slot-name" class="slot">---</div>
        <div id="slot-pos" class="slot">---</div>
        <div id="slot-team" class="slot">---</div>
    </div>
</div>

<div class="container">
    <h1>Custom Matchmaking 2.1</h1>
    <button id="startBtn" onclick="startDraft()">START DRAFT</button>
    <div id="matchWrap" class="match-wrap">
        <div class="team-box" id="blueTeam"><div style="color:#0097e6">BLUE TEAM</div></div>
        <div class="team-box" id="redTeam"><div style="color:#e84118">RED TEAM</div></div>
    </div>
</div>

<script>
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    async function runSlot(elementId, items, color) {
        const el = document.getElementById(elementId);
        el.classList.add('active');
        let delay = 50;
        for(let i=0; i<15; i++) {
            el.innerText = items[Math.floor(Math.random() * items.length)];
            await sleep(delay);
            delay += 20;
        }
        const result = items[Math.floor(Math.random() * items.length)];
        el.innerText = result;
        el.style.color = color || "#c8aa6e";
        return result;
    }

    async function startDraft() {
        document.getElementById('modalOverlay').style.display = 'flex';
        let pool = [...selected], bluePos = ["TOP", "JUNGLE", "MID", "BOT", "SUP"], redPos = [...bluePos];
        let bCount = 0, rCount = 0;

        for(let i=0; i<10; i++) {
            // 초기화
            document.querySelectorAll('.slot').forEach(s => { s.innerText = "---"; s.style.color = "#555"; });

            const name = await runSlot('slot-name', pool);
            pool = pool.filter(x => x !== name);
            await sleep(1000); // 1초 보여주기

            const team = (bCount >= 5) ? "RED TEAM" : (rCount >= 5) ? "BLUE TEAM" : await runSlot('slot-team', ["BLUE TEAM", "RED TEAM"]);
            const color = (team === "BLUE TEAM") ? "#0097e6" : "#e84118";
            if(team === "BLUE TEAM") bCount++; else rCount++;
            await sleep(1000);

            const posList = (team === "BLUE TEAM" ? bluePos : redPos);
            const pos = await runSlot('slot-pos', posList, color);
            if(team === "BLUE TEAM") bluePos = bluePos.filter(x => x !== pos); else redPos = redPos.filter(x => x !== pos);
            await sleep(1000);

            // 리스트 추가
            document.getElementById(team === "BLUE TEAM" ? 'blueTeam' : 'redTeam').innerHTML += 
                `<div class="player-row" style="color:${color}"><div class="badge">${pos}</div>${name}</div>`;
        }
        document.getElementById('modalOverlay').style.display = 'none';
    }
</script>
</body>
</html>
