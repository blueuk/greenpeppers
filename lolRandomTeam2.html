<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOL CUSTOM MATCH - STEPPED GACHA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background: radial-gradient(circle, #0a1428 0%, #010a13 100%); color: #f0e6d2; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1000px; }
        h1 { text-align: center; color: #c8aa6e; letter-spacing: 5px; border-bottom: 2px solid #c89b3c; padding-bottom: 10px; }
        
        /* 모달 스타일 */
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-card { background: #010a13; border: 2px solid #c8aa6e; width: 90%; max-width: 600px; padding: 40px; text-align: center; color: #f0e6d2; }
        .slot-display { font-size: 50px; font-weight: bold; color: #c8aa6e; margin: 30px 0; height: 80px; }
        .next-btn { padding: 15px 40px; background: #c8aa6e; color: #1e2328; font-weight: bold; cursor: pointer; border: none; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; }
        .start-btn { padding: 15px 50px; background: #1e2328; color: #c8aa6e; border: 1px solid #c8aa6e; cursor: pointer; font-size: 18px; font-weight: bold; }
        .match-wrap { display: flex; justify-content: space-between; gap: 20px; width: 100%; }
        .team-box { flex: 1; border: 1px solid #5b5a56; padding: 20px; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div class="modal-card">
        <h2 id="modalTitle">STEP 1: 닉네임 추첨</h2>
        <div id="slotDisplay" class="slot-display">---</div>
        <button id="nextBtn" class="next-btn" onclick="handleNextStep()">확인</button>
    </div>
</div>

<div class="container">
    <h1>Custom Matchmaking</h1>
    <div style="text-align: center; margin-bottom: 20px;">
        <button id="startBtn" class="start-btn" onclick="startNewDraft()">START DRAFT</button>
    </div>
    <div class="match-wrap" id="matchWrap" style="display:none;">
        <div class="team-box blue-side"><h3>BLUE TEAM</h3><div id="blueList"></div></div>
        <div class="team-box red-side"><h3>RED TEAM</h3><div id="redList"></div></div>
    </div>
</div>

<script>
    let participants = ["민준국", "이아니스", "최빛누리", "골드레이", "귀요미 상우", "나도너도속는무빙", "대 파", "로밍과 줄리엣", "바린이", "배시시시"];
    let currentStep = 0; // 0:닉네임, 1:포지션, 2:팀
    let draftData = { name: '', pos: '', team: '' };
    let pickedCount = 0;

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    async function startNewDraft() {
        pickedCount = 0;
        document.getElementById('blueList').innerHTML = "";
        document.getElementById('redList').innerHTML = "";
        document.getElementById('matchWrap').style.display = 'flex';
        nextRound();
    }

    async function nextRound() {
        if (pickedCount >= 10) { document.getElementById('modalOverlay').style.display = 'none'; return; }
        currentStep = 0;
        runRoulette();
    }

    async function runRoulette() {
        document.getElementById('modalOverlay').style.display = 'flex';
        const display = document.getElementById('slotDisplay');
        const title = document.getElementById('modalTitle');
        
        // 1. 닉네임 룰렛
        title.innerText = "STEP 1: 닉네임";
        for(let i=0; i<10; i++) {
            display.innerText = participants[Math.floor(Math.random()*participants.length)];
            await sleep(50);
        }
        draftData.name = participants[Math.floor(Math.random()*participants.length)];
        display.innerText = draftData.name;
    }

    async function handleNextStep() {
        const display = document.getElementById('slotDisplay');
        const title = document.getElementById('modalTitle');
        
        if (currentStep === 0) { // 2. 포지션 룰렛으로 이동
            currentStep = 1;
            title.innerText = "STEP 2: 포지션";
            for(let i=0; i<10; i++) {
                display.innerText = ["TOP", "JNG", "MID", "BOT", "SUP"][Math.floor(Math.random()*5)];
                await sleep(50);
            }
            draftData.pos = ["TOP", "JNG", "MID", "BOT", "SUP"][Math.floor(Math.random()*5)];
            display.innerText = draftData.pos;
        } else if (currentStep === 1) { // 3. 팀 룰렛으로 이동
            currentStep = 2;
            title.innerText = "STEP 3: 팀 배정";
            for(let i=0; i<10; i++) {
                display.innerText = Math.random() > 0.5 ? "BLUE" : "RED";
                await sleep(50);
            }
            draftData.team = Math.random() > 0.5 ? "BLUE" : "RED";
            display.innerText = draftData.team;
        } else { // 결과 반영
            const list = document.getElementById(draftData.team === "BLUE" ? 'blueList' : 'redList');
            list.innerHTML += `<div>${draftData.pos} | ${draftData.name}</div>`;
            pickedCount++;
            document.getElementById('modalOverlay').style.display = 'none';
            if (pickedCount < 10) setTimeout(nextRound, 500);
        }
    }
</script>
</body>
</html>
