<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LoL Hextech Slot Machine</title>
    <style>
        :root {
            --hextech-gold: #c89b3c;
            --hextech-border: #785a28;
            --bg-dark: #010a13;
            --panel-bg: rgba(5, 13, 22, 0.9);
        }

        body {
            background-color: var(--bg-dark);
            color: #f0e6d2;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
            margin: 0;
            background-image: radial-gradient(circle, #0a1428 0%, #010a13 100%);
        }

        h1 {
            color: var(--hextech-gold);
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(200, 155, 60, 0.5);
            margin-bottom: 40px;
        }

        /* 4개의 큰 행(Row) 컨테이너 */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            gap: 25px; /* 행 사이 간격 */
        }

        /* 5개 슬롯을 감싸는 하나의 네모칸(행) */
        .slot-row-panel {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: var(--panel-bg);
            border: 2px solid var(--hextech-border);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* 행 번호 표시 (장식용) */
        .slot-row-panel::before {
            content: 'UNIT';
            position: absolute;
            left: -50px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            color: var(--hextech-border);
            font-size: 12px;
            font-weight: bold;
        }

        /* 개별 슬롯 */
        .slot {
            width: 110px;
            height: 140px;
            background: #000;
            border: 1px solid #3c3c3c;
            overflow: hidden;
            position: relative;
        }

        /* 슬롯 내부 회전 박스 */
        .slot-inner {
            display: flex;
            flex-direction: column;
        }

        .item {
            width: 110px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.95rem;
            color: #a0946e;
            border-bottom: 1px solid rgba(200, 155, 60, 0.1);
            flex-shrink: 0;
            background: linear-gradient(180deg, #091428 0%, #050d16 100%);
        }

        /* 버튼 */
        .draw-button {
            margin-top: 50px;
            padding: 15px 80px;
            background: #1e2328;
            color: var(--hextech-gold);
            border: 2px solid var(--hextech-gold);
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .draw-button:hover:not(:disabled) {
            background: var(--hextech-gold);
            color: #1e2328;
            box-shadow: 0 0 25px var(--hextech-gold);
        }

        .draw-button:disabled {
            opacity: 0.4;
            cursor: wait;
        }
    </style>
</head>
<body>

    <h1>CHAMPION REWROUGHT</h1>

    <div class="main-wrapper" id="main-wrapper">
        </div>

    <button class="draw-button" onclick="launchSummon()">소환 시작</button>

    <script>
        const allChampions = [
            "가렌", "갈리오", "갱플랭크", "그라가스", "그레이브즈", "나르", "나미", "나서스", "나피리", "노틸러스", "녹턴", "누누", "니달리", "니코", "니플라", "다리우스", "다이애나", "드레이븐", "라이즈", "라칸", "람머스", "럭스", "럼블", "레나타", "레넥톤", "레오나", "렉사이", "렐", "렌가", "루시안", "루루", "르블랑", "리 신", "리븐", "리산드라", "릴리아", "마스터 이", "마오카이", "말자하", "말파이트", "모데카이저", "모르가나", "문도", "미스 포츈", "밀리오", "바드", "바루스", "바이", "베이가", "베인", "벨코즈", "벨베스", "볼리베어", "브라움", "브랜드", "브라이어", "블라디미르", "블리츠", "비에고", "빅토르", "뽀삐", "사미라", "사이온", "사일러스", "샤코", "세나", "세라핀", "세주아니", "세트", "소나", "소라카", "쉔", "쉬바나", "스웨인", "스카너", "스몰더", "시비르", "신 짜오", "신드라", "신지드", "쓰레쉬", "아리", "아무무", "아우솔", "아이번", "아지르", "아칼리", "아크샨", "아트록스", "아펠리오스", "알리스타", "애니", "애니비아", "애쉬", "야스오", "에코", "엘리스", "오공", "오른", "오리아나", "올라프", "요네", "요릭", "우디르", "우르곳", "워윅", "유미", "이렐리아", "이브린", "이즈리얼", "일라오이", "자르반", "자야", "자이라", "자크", "잔나", "잭스", "제드", "제라스", "제리", "제이스", "조이", "직스", "진", "질리언", "징크스", "초가스", "카르마", "카밀", "카사딘", "카시오페아", "카이사", "카직스", "카타리나", "칼리스타", "케넨", "케이틀린", "케인", "케일", "코그모", "코르키", "퀸", "클레드", "키아나", "킨드레드", "타릭", "탈론", "탈리야", "탐 켄치", "트런들", "트리스타나", "트린다미어", "트페", "트위치", "티모", "파이크", "판테온", "피들스틱", "피오라", "피즈", "하이머딩거", "헤카림", "흐웨이"
        ];

        const wrapper = document.getElementById('main-wrapper');
        const rows = 4;
        const slotsPerRow = 5;

        // 초기 구조 생성
        for (let r = 0; r < rows; r++) {
            const rowPanel = document.createElement('div');
            rowPanel.className = 'slot-row-panel';
            
            for (let s = 0; s < slotsPerRow; s++) {
                const slotIdx = (r * slotsPerRow) + s;
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.innerHTML = `<div class="slot-inner" id="inner-${slotIdx}"><div class="item">READY</div></div>`;
                rowPanel.appendChild(slot);
            }
            wrapper.appendChild(rowPanel);
        }

        function launchSummon() {
            const btn = document.querySelector('.draw-button');
            btn.disabled = true;

            // 중복 없이 20개 추출
            const shuffled = [...allChampions].sort(() => 0.5 - Math.random());
            const results = shuffled.slice(0, 20);

            for (let i = 0; i < 20; i++) {
                const inner = document.getElementById(`inner-${i}`);
                inner.innerHTML = '';

                // 애니메이션용 가짜 리스트 (위에서 아래로 흐르는 느낌)
                const scrollItems = [];
                for(let j=0; j<20; j++) {
                    scrollItems.push(allChampions[Math.floor(Math.random() * allChampions.length)]);
                }
                scrollItems.push(results[i]); // 최종 도착지

                scrollItems.forEach(name => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.innerText = name;
                    inner.appendChild(div);
                });

                // 애니메이션 설정
                inner.style.transition = 'none';
                inner.style.transform = `translateY(0)`;

                setTimeout(() => {
                    const duration = 2 + (Math.random() * 2); 
                    inner.style.transition = `transform ${duration}s cubic-bezier(0.1, 0, 0.1, 1)`;
                    inner.style.transform = `translateY(-${(scrollItems.length - 1) * 140}px)`;
                }, 50 + (i * 30)); // 각 슬롯마다 미세하게 시차를 두어 더 역동적임
            }

            setTimeout(() => { btn.disabled = false; }, 4500);
        }
    </script>
</body>
</html>
