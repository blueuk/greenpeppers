<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOL CUSTOM - DOUBLE GACHA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background: radial-gradient(circle, #0a1428 0%, #010a13 100%); color: #f0e6d2; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1000px; }
        h1 { text-align: center; color: #c8aa6e; letter-spacing: 5px; border-bottom: 2px solid #c89b3c; padding-bottom: 10px; }
        .section-box { background: rgba(1, 10, 19, 0.9); border: 1px solid #5b5a56; padding: 20px; margin-bottom: 20px; }
        .pool-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .member-chip { background: #1e2328; border: 1px solid #5b5a56; color: #cdbe91; padding: 6px 12px; cursor: pointer; transition: 0.2s; }
        .member-chip.selected { border-color: #c8aa6e; background: #c8aa6e; color: #1e2328; }
        .entry-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; }
        .entry-slot { height: 40px; border: 1px solid #5b5a56; display: flex; align-items: center; justify-content: center; background: #0a1428; }
        .entry-slot.filled { border-color: #c8aa6e; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 15px 30px; cursor: pointer; font-weight: bold; }
        .start-btn { background: #c8aa6e; color: #010a13; border: none; flex: 3; }
        .reset-btn { background: transparent; border: 1px solid #e84118; color: #e84118; flex: 1; }
        
        #modalOverlay { position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .roulette-text { font-size: 4vw; font-weight: bold; color: #c8aa6e; margin: 20px 0; height: 100px; display: flex; align-items: center; justify-content: center; }
        .match-wrap { display: none; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .team-box { border: 1px solid #5b5a56; padding: 15px; background: #0a1428; }
        .player-row { padding: 10px; border-bottom: 1px solid #3c3c41; font-weight: bold; }
    </style>
</head>
<body>

<div id="modalOverlay">
    <div id="modalLabel" style="font-size: 2rem; color: #a09b8c;">DRAFTING...</div>
    <div id="rouletteDisplay" class="roulette-text">---</div>
</div>

<div class="container">
    <h1>Custom Matchmaking</h1>
    <div class="section-box">
        <div class="pool-grid" id="poolGrid"></div>
        <div class="entry-grid" id="entryGrid"></div>
    </div>
    <div class="btn-group">
        <button class="reset-btn" onclick="location.reload()">RESET ALL</button>
        <button id="startBtn" class="start-btn" onclick="startDraft()" disabled>START DRAFT</button>
    </div>
    <div id="matchWrap" class="match-wrap">
        <div class="team-box" id="blueTeam"><div style="color:#0097e6; margin-bottom:10px;">BLUE TEAM</div></div>
        <div class="team-box" id="redTeam"><div style="color:#e84118; margin-bottom:10px;">RED TEAM</div></div>
    </div>
</div>

<script>
    const MEMBERS = ["민준국", "이아니스", "최빛누리", "골드레이", "귀요미 상우", "나도너도속는무빙", "대 파", "로밍과 줄리엣", "바린이", "배시시시", "성일짱", "아메리칸 프로그", "여기 쓸쓸함 한잔 주시오", "임쏘은", "조즈리얼", "증오는 빼는 편이야", "지나가는루돌프", "태구리", "해운대구보안관"];
    let selected = [];

    function init() {
        const grid = document.getElementById('poolGrid');
        MEMBERS.forEach(m => {
            const div = document.createElement('div'); div.className = 'member-chip'; div.innerText = m;
            div.onclick = () => {
                if(selected.includes(m)) selected = selected.filter(x => x !== m);
                else if(selected.length < 10) selected.push(m);
                updateUI();
            };
            grid.appendChild(div);
        });
        for(let i=0; i<10; i++) {
            const slot = document.createElement('div'); slot.className = 'entry-slot'; slot.id = `slot-${i}`;
            document.getElementById('entryGrid').appendChild(slot);
        }
    }

    function updateUI() {
        document.querySelectorAll('.member-chip').forEach(c => c.classList.toggle('selected', selected.includes(c.innerText)));
        for(let i=0; i<10; i++) { const s = document.getElementById(`slot-${i}`); s.innerText = selected[i] || ""; s.classList.toggle('filled', !!selected[i]); }
        document.getElementById('startBtn').disabled = selected.length !== 10;
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms));

    async function runRoulette(items, label) {
        document.getElementById('modalLabel').innerText = label;
        const disp = document.getElementById('rouletteDisplay');
        for(let i=0; i<15; i++) {
            disp.innerText = items[Math.floor(Math.random() * items.length)];
            await sleep(70);
        }
        const result = items[Math.floor(Math.random() * items.length)];
        disp.innerText = result;
        return result;
    }

    async function startDraft() {
        document.getElementById('modalOverlay').style.display = 'flex';
        document.getElementById('matchWrap').style.display = 'grid';
        document.getElementById('blueTeam').innerHTML = '<div style="color:#0097e6; margin-bottom:10px;">BLUE TEAM</div>';
        document.getElementById('redTeam').innerHTML = '<div style="color:#e84118; margin-bottom:10px;">RED TEAM</div>';
        
        let pool = [...selected];
        let bluePos = ["TOP", "JUNGLE", "MID", "BOT", "SUP"];
        let redPos = ["TOP", "JUNGLE", "MID", "BOT", "SUP"];
        
        for(let i=0; i<10; i++) {
            const name = await runRoulette(pool, "SUMMONER");
            pool = pool.filter(x => x !== name);
            await sleep(500);
            
            const teamSide = await runRoulette(["BLUE TEAM", "RED TEAM"], "TEAM ASSIGN");
            
            let pos;
            if (teamSide === "BLUE TEAM") {
                pos = bluePos[Math.floor(Math.random() * bluePos.length)];
                bluePos = bluePos.filter(x => x !== pos);
            } else {
                pos = redPos[Math.floor(Math.random() * redPos.length)];
                redPos = redPos.filter(x => x !== pos);
            }
            
            document.getElementById('rouletteDisplay').innerText = pos;
            await sleep(1000);
            
            const target = teamSide === "BLUE TEAM" ? 'blueTeam' : 'redTeam';
            document.getElementById(target).innerHTML += `<div class="player-row">${pos} | ${name}</div>`;
            
            document.getElementById('modalLabel').innerText = "결과 확인 중...";
            await sleep(3000);
        }
        document.getElementById('modalOverlay').style.display = 'none';
        document.getElementById('startBtn').innerText = "RE-ROLL DRAFT";
    }

    init();
</script>
</body>
</html>
