<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LoL Fearless Draft v1.1.1</title>
    <style>
        :root {
            --lol-gold: #c8aa6e;
            --blue-team: #0ac8b9;
            --red-team: #ef3f27;
            --bg-dark: #010a13;
        }

        body {
            background: radial-gradient(circle, #091428 0%, #010a13 100%);
            color: white;
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header-controls { width: 100%; max-width: 1300px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .version-tag { color: var(--lol-gold); font-size: 12px; border: 1px solid var(--lol-gold); padding: 2px 8px; }
        .reset-btn { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; cursor: pointer; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
        .reset-btn:hover { background: #ff4d4d; color: white; }

        /* 밴 영역 (실시간 드래프트) */
        .ban-container { display: flex; justify-content: center; gap: 50px; margin: 10px 0; }
        .ban-group { display: flex; gap: 4px; }
        .ban-slot { width: 35px; height: 35px; border: 1px solid #444; background: #000; position: relative; }
        .ban-slot img { width: 100%; filter: grayscale(1); } /* 드래프트 중 밴은 항상 흑백 */
        
        /* 픽 영역 (실시간 드래프트) */
        .draft-main { display: grid; grid-template-columns: 220px 1fr 220px; gap: 15px; width: 100%; max-width: 1300px; }
        .side-panel { display: flex; flex-direction: column; gap: 8px; }
        .pick-slot {
            height: 70px; border: 1px solid #333; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; position: relative; overflow: hidden;
        }
        .pick-slot.blue { border-left: 4px solid var(--blue-team); }
        .pick-slot.red { border-right: 4px solid var(--red-team); flex-direction: row-reverse; }
        .pick-slot img { height: 100%; position: absolute; right: 0; opacity: 0.6; z-index: 0; }
        .pick-name { padding: 0 15px; font-weight: bold; z-index: 1; text-shadow: 2px 2px 4px #000; }

        /* 현재 순서 강조 */
        @keyframes glow {
            0% { box-shadow: 0 0 5px var(--lol-gold); border-color: var(--lol-gold); }
            50% { box-shadow: 0 0 20px var(--lol-gold); border-color: #fff; }
            100% { box-shadow: 0 0 5px var(--lol-gold); border-color: var(--lol-gold); }
        }
        .active-turn { animation: glow 1.5s infinite ease-in-out; z-index: 2; border: 2px solid var(--lol-gold) !important; }

        /* 중앙 챔피언 그리드 */
        .center-area { display: flex; flex-direction: column; align-items: center; }
        .champ-grid {
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px;
            max-height: 480px; overflow-y: auto; padding: 10px; border: 1px solid #222; background: rgba(0,0,0,0.3);
        }
        .champ-item { width: 55px; cursor: pointer; transition: 0.1s; border: 1px solid transparent; }
        .champ-item:hover { border-color: var(--lol-gold); transform: scale(1.1); }
        .champ-item.disabled { filter: grayscale(1); opacity: 0.15; pointer-events: none; }
        .champ-item img { width: 100%; }

        /* 히스토리 영역 (이미지 포함) */
        .history-area { margin-top: 30px; width: 100%; max-width: 1300px; border-top: 1px solid #333; padding-top: 10px; }
        .history-item { background: rgba(255,255,255,0.03); padding: 15px; margin-bottom: 10px; border-radius: 4px; display: flex; flex-direction: column; gap: 10px; }
        .history-set-title { font-weight: bold; color: var(--lol-gold); border-bottom: 1px solid #444; padding-bottom: 5px; }
        .history-row { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .history-row:last-child { border-bottom: none; }
        .history-champs { display: flex; gap: 5px; align-items: center; }
        .history-champs img { width: 35px; height: 35px; border: 1px solid #555; border-radius: 2px; }
        /* 히스토리 내 밴 초상화 흑백 처리 */
        .history-champs img.history-ban-img { filter: grayscale(1); border-color: #333; opacity: 0.6; } 
        
        .team-label { width: 80px; font-weight: bold; font-size: 13px; }
        .section-label { font-size: 11px; color: #777; font-weight: bold; margin-right: 5px; }

        button.complete-btn { background: var(--lol-gold); border: none; padding: 10px 30px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header-controls">
    <button class="reset-btn" onclick="confirmReset()">전체 데이터 초기화</button>
    <div class="version-tag">ver 1.1.1</div>
</div>

<h3 style="color: var(--lol-gold); margin: 0 0 10px 0;">FEARLESS DRAFT SYSTEM</h3>

<div class="ban-container">
    <div class="ban-group" id="blueBans"></div>
    <div style="line-height: 35px; color: #666; font-size: 12px; font-weight: bold;">PHASE 1 & 2 BANS</div>
    <div class="ban-group" id="redBans"></div>
</div>

<div class="draft-main">
    <div class="side-panel" id="bluePicks"></div>
    <div class="center-area">
        <div id="statusText" style="margin-bottom: 10px; color: var(--lol-gold); font-weight: bold;">대기 중...</div>
        <div class="champ-grid" id="champGrid"></div>
        <button class="complete-btn" id="finishBtn" onclick="finishSet()" style="display:none;">SET 완료 및 기록</button>
    </div>
    <div class="side-panel" id="redPicks"></div>
</div>

<div class="history-area">
    <h4 style="margin: 5px 0 15px 0;">MATCH HISTORY</h4>
    <div id="historyLog"></div>
</div>

<script>
    const champions = ["Aatrox", "Ahri", "Akali", "Alistar", "Amumu", "Anivia", "Ashe", "Azir", "Bard", "Blitzcrank", "Brand", "Braum", "Caitlyn", "Camille", "Cassiopeia", "Darius", "Diana", "Ezreal", "Fiora", "Fizz", "Garen", "Gnar", "Gragas", "Graves", "Gwen", "Hecarim", "Irelia", "Jax", "Jhin", "KaiSa", "Karma", "Kassadin", "Katarina", "LeeSin", "Leona", "Lux", "Malphite", "Nautilus", "Orianna", "Ornn", "Pyke", "Riven", "Sett", "Sylas", "Thresh", "Vayne", "Yone", "Yuumi", "Zed"];

    const sequence = [
        {t:'ban', side:'blue', i:0}, {t:'ban', side:'red', i:0}, {t:'ban', side:'blue', i:1}, {t:'ban', side:'red', i:1}, {t:'ban', side:'blue', i:2}, {t:'ban', side:'red', i:2},
        {t:'pick', side:'blue', i:0}, {t:'pick', side:'red', i:0}, {t:'pick', side:'red', i:1}, {t:'pick', side:'blue', i:1}, {t:'pick', side:'blue', i:2}, {t:'pick', side:'red', i:2},
        {t:'ban', side:'red', i:3}, {t:'ban', side:'blue', i:3}, {t:'ban', side:'red', i:4}, {t:'ban', side:'blue', i:4},
        {t:'pick', side:'red', i:3}, {t:'pick', side:'blue', i:3}, {t:'pick', side:'blue', i:4}, {t:'pick', side:'red', i:4}
    ];

    const sfx = {
        ban: new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3'),
        pick: new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3'),
        complete: new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3')
    };

    let step = 0;
    let currentSet = 1;
    let fearlessBans = JSON.parse(sessionStorage.getItem('fearlessBans')) || [];
    let history = JSON.parse(sessionStorage.getItem('draftHistory')) || [];
    let currentDraft = { bluePicks: [], redPicks: [], blueBans: [], redBans: [] };

    function initBoard() {
        createSlots('blueBans', 5, 'ban-slot');
        createSlots('redBans', 5, 'ban-slot');
        createSlots('bluePicks', 5, 'pick-slot blue');
        createSlots('redPicks', 5, 'pick-slot red');
        renderChamps();
        updateUI();
    }

    function createSlots(id, count, className) {
        const el = document.getElementById(id);
        el.innerHTML = '';
        for(let i=0; i<count; i++) {
            const div = document.createElement('div');
            div.className = className;
            div.id = `${id}-${i}`;
            el.appendChild(div);
        }
    }

    function renderChamps() {
        const grid = document.getElementById('champGrid');
        grid.innerHTML = '';
        champions.sort().forEach(champ => {
            const isDisabled = fearlessBans.includes(champ) || Object.values(currentDraft).flat().includes(champ);
            const div = document.createElement('div');
            div.className = `champ-item ${isDisabled ? 'disabled' : ''}`;
            div.innerHTML = `<img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/${champ}.png">`;
            div.onclick = () => selectChamp(champ);
            grid.appendChild(div);
        });
    }

    function selectChamp(name) {
        if(step >= sequence.length) return;
        const turn = sequence[step];
        const targetList = turn.side + (turn.t === 'ban' ? 'Bans' : 'Picks');
        currentDraft[targetList][turn.i] = name;
        
        sfx[turn.t].currentTime = 0;
        sfx[turn.t].play();

        step++;
        renderChamps();
        updateUI();
    }

    function updateUI() {
        ['blueBans', 'redBans', 'bluePicks', 'redPicks'].forEach(key => {
            currentDraft[key].forEach((name, i) => {
                const slot = document.getElementById(`${key}-${i}`);
                if(name) {
                    const imgUrl = key.includes('Picks') 
                        ? `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${name}_0.jpg`
                        : `https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/${name}.png`;
                    slot.innerHTML = `<img src="${imgUrl}"><div class="pick-name">${name}</div>`;
                }
            });
        });

        document.querySelectorAll('.active-turn').forEach(el => el.classList.remove('active-turn'));
        
        if(step < sequence.length) {
            const turn = sequence[step];
            const activeId = `${turn.side}${turn.t === 'ban' ? 'Bans' : 'Picks'}-${turn.i}`;
            const targetEl = document.getElementById(activeId);
            if(targetEl) targetEl.classList.add('active-turn');
            document.getElementById('statusText').innerText = `NEXT: ${turn.side.toUpperCase()} ${turn.t.toUpperCase()}`;
            document.getElementById('finishBtn').style.display = 'none';
        } else {
            document.getElementById('statusText').innerText = `밴픽 완료!`;
            document.getElementById('finishBtn').style.display = 'block';
        }
    }

    function finishSet() {
        sfx.complete.play();
        history.push({ ...currentDraft, set: currentSet });
        fearlessBans = [...fearlessBans, ...currentDraft.bluePicks, ...currentDraft.redPicks];
        
        sessionStorage.setItem('fearlessBans', JSON.stringify(fearlessBans));
        sessionStorage.setItem('draftHistory', JSON.stringify(history));

        currentDraft = { bluePicks: [], redPicks: [], blueBans: [], redBans: [] };
        step = 0;
        currentSet++;
        initBoard();
        renderHistory();
    }

    function renderHistory() {
        const log = document.getElementById('historyLog');
        log.innerHTML = history.slice().reverse().map(h => `
            <div class="history-item">
                <div class="history-set-title">SET ${h.set} SUMMARY</div>
                
                <div class="history-row">
                    <div class="team-label blue-text" style="color:var(--blue-team)">BLUE TEAM</div>
                    <div class="history-champs">
                        <span class="section-label">PICKS:</span>
                        ${h.bluePicks.map(c => `<img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/${c}.png" title="${c}">`).join('')}
                    </div>
                    <div class="history-champs" style="margin-left:15px;">
                        <span class="section-label">BANS:</span>
                        ${h.blueBans.map(c => `<img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/${c}.png" class="history-ban-img" title="${c}">`).join('')}
                    </div>
                </div>

                <div class="history-row">
                    <div class="team-label red-text" style="color:var(--red-team)">RED TEAM</div>
                    <div class="history-champs">
                        <span class="section-label">PICKS:</span>
                        ${h.redPicks.map(c => `<img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/${c}.png" title="${c}">`).join('')}
                    </div>
                    <div class="history-champs" style="margin-left:15px;">
                        <span class="section-label">BANS:</span>
                        ${h.redBans.map(c => `<img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/${c}.png" class="history-ban-img" title="${c}">`).join('')}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function confirmReset() {
        if(confirm("모든 밴픽 히스토리와 피어리스 데이터를 초기화할까요? 이 작업은 되돌릴 수 없습니다.")) {
            sessionStorage.clear();
            location.reload();
        }
    }

    initBoard();
    renderHistory();
</script>
</body>
</html>
