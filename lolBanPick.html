<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LoL Fearless Draft v1.3.1</title>
    <style>
        :root {
            --lol-gold: #c8aa6e;
            --blue-team: #0ac8b9;
            --red-team: #ef3f27;
            --bg-dark: #010a13;
        }

        body {
            background: radial-gradient(circle, #091428 0%, #010a13 100%);
            color: white;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header-controls { width: 100%; max-width: 1300px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .version-tag { color: var(--lol-gold); font-size: 12px; border: 1px solid var(--lol-gold); padding: 2px 8px; }
        
        .control-btns { display: flex; gap: 10px; align-items: center; }
        .undo-btn { background: #333; color: white; border: 1px solid #555; cursor: pointer; padding: 4px 12px; border-radius: 4px; font-size: 12px; }
        .undo-btn:hover { background: #555; border-color: var(--lol-gold); }
        .reset-btn { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; cursor: pointer; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
        .reset-btn:hover { background: #ff4d4d; color: white; }
        
        /* BGM 버튼 스타일 */
        .mute-btn { 
            background: none; border: 1px solid var(--lol-gold); color: var(--lol-gold); 
            cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 14px; 
            display: flex; align-items: center; justify-content: center; width: 35px; height: 30px;
        }
        .mute-btn:hover { background: rgba(200, 170, 110, 0.2); }

        .ban-container { display: flex; justify-content: center; gap: 50px; margin: 10px 0; }
        .ban-group { display: flex; gap: 4px; }
        .ban-slot { width: 35px; height: 35px; border: 1px solid #444; background: #000; position: relative; transition: all 0.3s; }
        .ban-slot img { width: 100%; filter: grayscale(1); }
        
        .draft-main { display: grid; grid-template-columns: 220px 1fr 220px; gap: 15px; width: 100%; max-width: 1300px; }
        .side-panel { display: flex; flex-direction: column; gap: 8px; }
        .pick-slot {
            height: 70px; border: 1px solid #333; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; position: relative; overflow: hidden;
            transition: all 0.4s ease;
        }
        .pick-slot.blue { border-left: 4px solid var(--blue-team); }
        .pick-slot.red { border-right: 4px solid var(--red-team); flex-direction: row-reverse; }
        .pick-slot img { height: 100%; position: absolute; right: 0; opacity: 0.6; z-index: 0; transition: transform 0.5s; }
        .pick-name { padding: 0 15px; font-weight: bold; z-index: 1; text-shadow: 2px 2px 4px #000; font-size: 14px; }

        @keyframes glow {
            0% { box-shadow: 0 0 5px var(--lol-gold); border-color: var(--lol-gold); }
            50% { box-shadow: 0 0 20px var(--lol-gold); border-color: #fff; }
            100% { box-shadow: 0 0 5px var(--lol-gold); border-color: var(--lol-gold); }
        }
        .active-turn { animation: glow 1.5s infinite ease-in-out; z-index: 2; border: 2px solid var(--lol-gold) !important; }

        .center-area { display: flex; flex-direction: column; align-items: center; }
        #searchBar {
            background: #010a13; border: 1px solid var(--lol-gold); color: white;
            padding: 8px; width: 80%; margin-bottom: 10px; text-align: center;
        }

        .champ-grid {
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px;
            max-height: 300px; overflow-y: auto; padding: 10px; border: 1px solid #222; background: rgba(0,0,0,0.3);
        }
        .champ-item { 
            width: 55px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid transparent; text-align: center; position: relative;
        }
        .champ-item:not(.disabled):hover { 
            border-color: var(--lol-gold); 
            transform: scale(1.15); 
            z-index: 10;
            box-shadow: 0 0 15px rgba(200, 170, 110, 0.5);
        }
        .champ-item.disabled { filter: grayscale(1); opacity: 0.15; pointer-events: none; }
        .champ-item img { width: 100%; border-radius: 2px; }
        .champ-label { font-size: 10px; color: #ccc; margin-top: 2px; overflow: hidden; white-space: nowrap; }

        .history-area { margin-top: 30px; width: 100%; max-width: 1300px; border-top: 1px solid #333; padding-top: 10px; }
        .history-item { background: rgba(255,255,255,0.03); padding: 15px; margin-bottom: 10px; border-radius: 4px; display: flex; flex-direction: column; gap: 10px; }
        .history-set-title { font-weight: bold; color: var(--lol-gold); border-bottom: 1px solid #444; padding-bottom: 5px; }
        .history-row { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .history-champs { display: flex; gap: 5px; align-items: center; }
        .history-champs img { width: 35px; height: 35px; border: 1px solid #555; border-radius: 2px; transition: transform 0.2s; }
        .history-champs img:hover { transform: scale(1.2); z-index: 5; border-color: var(--lol-gold); }
        .history-ban-img { filter: grayscale(1); border-color: #333; opacity: 0.6; } 
        
        button.complete-btn { background: var(--lol-gold); border: none; padding: 10px 30px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button.complete-btn:hover { background: #e2c07d; box-shadow: 0 0 10px var(--lol-gold); }
    </style>
</head>
<body>

<div class="header-controls">
    <div class="control-btns">
        <button class="undo-btn" id="undoBtn" onclick="undoLastAction()">이전 단계로 되돌리기</button>
        <button class="reset-btn" onclick="confirmReset()">전체 데이터 초기화</button>
        <button class="mute-btn" id="bgmBtn" onclick="toggleBGM()" title="배경음악 ON/OFF">🔇</button>
    </div>
    <div class="version-tag">ver 1.3.1</div>
</div>

<h3 style="color: var(--lol-gold); margin: 0 0 10px 0;">FEARLESS DRAFT SYSTEM</h3>

<div class="ban-container">
    <div class="ban-group" id="blueBans"></div>
    <div style="line-height: 35px; color: #666; font-size: 12px; font-weight: bold;">PHASE 1 & 2 BANS</div>
    <div class="ban-group" id="redBans"></div>
</div>

<div class="draft-main">
    <div class="side-panel" id="bluePicks"></div>
    <div class="center-area">
        <input type="text" id="searchBar" placeholder="챔피언 검색 (한글)" onkeyup="renderChamps()">
        <div id="statusText" style="margin-bottom: 10px; color: var(--lol-gold); font-weight: bold;">최신 데이터 확인 중...</div>
        <div class="champ-grid" id="champGrid"></div>
        <button class="complete-btn" id="finishBtn" onclick="finishSet()" style="display:none;">SET 완료 및 기록</button>
    </div>
    <div class="side-panel" id="redPicks"></div>
</div>

<div class="history-area">
    <h4 style="margin: 5px 0 15px 0;">MATCH HISTORY</h4>
    <div id="historyLog"></div>
</div>

<script>
    let championData = {};
    let sortedChampKeys = []; 
    let latestVersion = "15.1.1"; 
    
    // 오디오 설정
    const sfx = {
        ban: new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3'),
        pick: new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3'),
        complete: new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3'),
        undo: new Audio('https://www.soundjay.com/buttons/sounds/button-11.mp3'),
        bgm: new Audio('lol_bg.mp3') // 로컬 배경음악 파일
    };
    sfx.bgm.loop = true;
    sfx.bgm.volume = 0.5; // 배경음 볼륨 50%

    let isPlaying = true;

    function toggleBGM() {
        const btn = document.getElementById('bgmBtn');
        if (isPlaying) {
            sfx.bgm.pause();
            btn.innerText = "🔇";
            isPlaying = false;
        } else {
            sfx.bgm.play().catch(e => console.log("자동 재생이 차단되었습니다. 상호작용 후 재생 가능합니다."));
            btn.innerText = "🔊";
            isPlaying = true;
        }
    }

    const sequence = [
        {t:'ban', side:'blue', i:0}, {t:'ban', side:'red', i:0}, {t:'ban', side:'blue', i:1}, {t:'ban', side:'red', i:1}, {t:'ban', side:'blue', i:2}, {t:'ban', side:'red', i:2},
        {t:'pick', side:'blue', i:0}, {t:'pick', side:'red', i:0}, {t:'pick', side:'red', i:1}, {t:'pick', side:'blue', i:1}, {t:'pick', side:'blue', i:2}, {t:'pick', side:'red', i:2},
        {t:'ban', side:'red', i:3}, {t:'ban', side:'blue', i:3}, {t:'ban', side:'red', i:4}, {t:'ban', side:'blue', i:4},
        {t:'pick', side:'red', i:3}, {t:'pick', side:'blue', i:3}, {t:'pick', side:'blue', i:4}, {t:'pick', side:'red', i:4}
    ];

    let step = 0;
    let currentSet = 1;
    let fearlessBans = JSON.parse(sessionStorage.getItem('fearlessBans')) || [];
    let history = JSON.parse(sessionStorage.getItem('draftHistory')) || [];
    let currentDraft = { bluePicks: [], redPicks: [], blueBans: [], redBans: [] };

    async function fetchChampions() {
        try {
            const versionRes = await fetch('https://ddragon.leagueoflegends.com/api/versions.json');
            const versions = await versionRes.json();
            latestVersion = versions[0];

            const res = await fetch(`https://ddragon.leagueoflegends.com/cdn/${latestVersion}/data/ko_KR/champion.json`);
            const data = await res.json();
            championData = data.data;
            
            sortedChampKeys = Object.keys(championData).sort((a, b) => 
                championData[a].name.localeCompare(championData[b].name)
            );

            document.getElementById('statusText').innerText = `v${latestVersion} 로드 완료!`;
            initBoard();
            renderHistory();
        } catch (err) {
            document.getElementById('statusText').innerText = "데이터 로드 실패";
        }
    }

    function initBoard() {
        createSlots('blueBans', 5, 'ban-slot');
        createSlots('redBans', 5, 'ban-slot');
        createSlots('bluePicks', 5, 'pick-slot blue');
        createSlots('redPicks', 5, 'pick-slot red');
        renderChamps();
        updateUI();
    }

    function createSlots(id, count, className) {
        const el = document.getElementById(id);
        el.innerHTML = '';
        for(let i=0; i<count; i++) {
            const div = document.createElement('div');
            div.className = className;
            div.id = `${id}-${i}`;
            el.appendChild(div);
        }
    }

    function renderChamps() {
        const grid = document.getElementById('champGrid');
        const query = document.getElementById('searchBar').value.toLowerCase();
        grid.innerHTML = '';
        
        sortedChampKeys.forEach(key => {
            const champ = championData[key];
            if(!champ.name.includes(query) && !key.toLowerCase().includes(query)) return;

            const isDisabled = fearlessBans.includes(key) || Object.values(currentDraft).flat().includes(key);
            const div = document.createElement('div');
            div.className = `champ-item ${isDisabled ? 'disabled' : ''}`;
            div.innerHTML = `
                <img src="https://ddragon.leagueoflegends.com/cdn/${latestVersion}/img/champion/${key}.png">
                <div class="champ-label">${champ.name}</div>
            `;
            div.onclick = () => selectChamp(key);
            grid.appendChild(div);
        });
    }

    function selectChamp(key) {
        if(step >= sequence.length) return;
        const turn = sequence[step];
        const targetList = turn.side + (turn.t === 'ban' ? 'Bans' : 'Picks');
        currentDraft[targetList][turn.i] = key;
        
        sfx[turn.t].currentTime = 0;
        sfx[turn.t].play();

        step++;
        renderChamps();
        updateUI();
    }

    function undoLastAction() {
        if (step <= 0) return;
        
        sfx.undo.currentTime = 0;
        sfx.undo.play();

        step--;
        const turn = sequence[step];
        const targetList = turn.side + (turn.t === 'ban' ? 'Bans' : 'Picks');
        
        const slot = document.getElementById(`${targetList}-${turn.i}`);
        slot.innerHTML = '';
        currentDraft[targetList][turn.i] = null;

        renderChamps();
        updateUI();
    }

    function updateUI() {
        ['blueBans', 'redBans', 'bluePicks', 'redPicks'].forEach(key => {
            currentDraft[key].forEach((champKey, i) => {
                const slot = document.getElementById(`${key}-${i}`);
                if(champKey) {
                    const champName = championData[champKey].name;
                    const imgUrl = key.includes('Picks') 
                        ? `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${champKey}_0.jpg`
                        : `https://ddragon.leagueoflegends.com/cdn/${latestVersion}/img/champion/${champKey}.png`;
                    slot.innerHTML = `<img src="${imgUrl}"><div class="pick-name">${champName}</div>`;
                } else {
                    slot.innerHTML = '';
                }
            });
        });

        document.querySelectorAll('.active-turn').forEach(el => el.classList.remove('active-turn'));
        
        if(step < sequence.length) {
            const turn = sequence[step];
            const activeId = `${turn.side}${turn.t === 'ban' ? 'Bans' : 'Picks'}-${turn.i}`;
            const targetEl = document.getElementById(activeId);
            if(targetEl) targetEl.classList.add('active-turn');
            document.getElementById('statusText').innerText = `NEXT: ${turn.side.toUpperCase()} ${turn.t.toUpperCase()}`;
            document.getElementById('finishBtn').style.display = 'none';
        } else {
            document.getElementById('statusText').innerText = `밴픽 완료!`;
            document.getElementById('finishBtn').style.display = 'block';
        }

        document.getElementById('undoBtn').style.opacity = step === 0 ? "0.5" : "1";
    }

    function finishSet() {
        sfx.complete.play();
        history.push({ ...currentDraft, set: currentSet });
        fearlessBans = [...fearlessBans, ...currentDraft.bluePicks.filter(x => x), ...currentDraft.redPicks.filter(x => x)];
        
        sessionStorage.setItem('fearlessBans', JSON.stringify(fearlessBans));
        sessionStorage.setItem('draftHistory', JSON.stringify(history));

        currentDraft = { bluePicks: [], redPicks: [], blueBans: [], redBans: [] };
        step = 0;
        currentSet++;
        initBoard();
        renderHistory();
        document.getElementById('searchBar').value = '';
    }

    function renderHistory() {
        const log = document.getElementById('historyLog');
        log.innerHTML = history.slice().reverse().map(h => `
            <div class="history-item">
                <div class="history-set-title">SET ${h.set} 결과</div>
                <div class="history-row">
                    <div class="team-label" style="color:var(--blue-team)">BLUE</div>
                    <div class="history-champs">
                        ${h.bluePicks.map(c => `<img src="https://ddragon.leagueoflegends.com/cdn/${latestVersion}/img/champion/${c}.png" title="${championData[c]?.name}">`).join('')}
                    </div>
                    <div class="history-champs" style="margin-left:15px; border-left: 1px solid #333; padding-left: 15px;">
                        ${h.blueBans.map(c => `<img src="https://ddragon.leagueoflegends.com/cdn/${latestVersion}/img/champion/${c}.png" class="history-ban-img" title="${championData[c]?.name}">`).join('')}
                    </div>
                </div>
                <div class="history-row">
                    <div class="team-label" style="color:var(--red-team)">RED</div>
                    <div class="history-champs">
                        ${h.redPicks.map(c => `<img src="https://ddragon.leagueoflegends.com/cdn/${latestVersion}/img/champion/${c}.png" title="${championData[c]?.name}">`).join('')}
                    </div>
                    <div class="history-champs" style="margin-left:15px; border-left: 1px solid #333; padding-left: 15px;">
                        ${h.redBans.map(c => `<img src="https://ddragon.leagueoflegends.com/cdn/${latestVersion}/img/champion/${c}.png" class="history-ban-img" title="${championData[c]?.name}">`).join('')}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function confirmReset() {
        if(confirm("모든 데이터를 초기화할까요?")) {
            sessionStorage.clear();
            location.reload();
        }
    }

    fetchChampions();
</script>
</body>
</html>
