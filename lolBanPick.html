<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LoL Fearless Draft v1.0.0</title>
    <style>
        :root {
            --lol-gold: #c8aa6e;
            --blue-team: #0ac8b9;
            --red-team: #ef3f27;
            --bg-dark: #010a13;
        }

        body {
            background: radial-gradient(circle, #091428 0%, #010a13 100%);
            color: white;
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        .version-tag { position: absolute; top: 10px; right: 20px; color: var(--lol-gold); font-size: 12px; border: 1px solid var(--lol-gold); padding: 2px 8px; }

        /* 밴 영역 */
        .ban-container { display: flex; justify-content: center; gap: 50px; margin: 10px 0; }
        .ban-group { display: flex; gap: 4px; }
        .ban-slot { width: 35px; height: 35px; border: 1px solid #444; background: #000; position: relative; }
        .ban-slot img { width: 100%; filter: grayscale(1); }
        
        /* 픽 영역 */
        .draft-main { display: grid; grid-template-columns: 220px 1fr 220px; gap: 15px; width: 100%; max-width: 1300px; }
        .side-panel { display: flex; flex-direction: column; gap: 8px; }
        .pick-slot {
            height: 70px; border: 1px solid #333; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; position: relative; overflow: hidden;
        }
        .pick-slot.blue { border-left: 4px solid var(--blue-team); }
        .pick-slot.red { border-right: 4px solid var(--red-team); flex-direction: row-reverse; }
        .pick-slot img { height: 100%; position: absolute; right: 0; opacity: 0.6; z-index: 0; }
        .pick-name { padding: 0 15px; font-weight: bold; z-index: 1; text-shadow: 2px 2px 4px #000; }

        /* 현재 순서 강조 효과 */
        @keyframes glow {
            0% { box-shadow: 0 0 5px var(--lol-gold); border-color: var(--lol-gold); }
            50% { box-shadow: 0 0 20px var(--lol-gold); border-color: #fff; }
            100% { box-shadow: 0 0 5px var(--lol-gold); border-color: var(--lol-gold); }
        }
        .active-turn { animation: glow 1.5s infinite ease-in-out; z-index: 2; border: 2px solid var(--lol-gold) !important; }

        /* 중앙 챔피언 그리드 */
        .center-area { display: flex; flex-direction: column; align-items: center; }
        .champ-grid {
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px;
            max-height: 480px; overflow-y: auto; padding: 10px; border: 1px solid #222; background: rgba(0,0,0,0.3);
        }
        .champ-item { width: 55px; cursor: pointer; transition: 0.1s; border: 1px solid transparent; }
        .champ-item:hover { border-color: var(--lol-gold); transform: scale(1.1); }
        .champ-item.disabled { filter: grayscale(1); opacity: 0.15; pointer-events: none; }
        .champ-item img { width: 100%; }

        /* 하단 기록 */
        .history-area { margin-top: 30px; width: 100%; max-width: 1300px; border-top: 1px solid #333; padding-top: 10px; }
        .history-item { background: rgba(255,255,255,0.03); padding: 10px; margin-bottom: 8px; border-radius: 4px; display: flex; justify-content: space-between; font-size: 13px; }

        button.complete-btn { background: var(--lol-gold); border: none; padding: 10px 30px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="version-tag">ver 1.0.0</div>
<h3 style="color: var(--lol-gold); margin: 5px;">FEARLESS DRAFT SYSTEM</h3>

<div class="ban-container">
    <div class="ban-group" id="blueBans"></div>
    <div style="line-height: 35px; color: #666; font-size: 12px; font-weight: bold;">PHASE 1 & 2 BANS</div>
    <div class="ban-group" id="redBans"></div>
</div>

<div class="draft-main">
    <div class="side-panel" id="bluePicks"></div>
    <div class="center-area">
        <div id="statusText" style="margin-bottom: 10px; color: var(--lol-gold); font-weight: bold;">대기 중...</div>
        <div class="champ-grid" id="champGrid"></div>
        <button class="complete-btn" id="finishBtn" onclick="finishSet()" style="display:none;">SET 완료 및 기록</button>
    </div>
    <div class="side-panel" id="redPicks"></div>
</div>

<div class="history-area">
    <h4 style="margin: 5px 0;">MATCH HISTORY</h4>
    <div id="historyLog"></div>
</div>

<script>
    // 샘플 챔피언 리스트 (실제 구현 시 더 추가 가능)
    const champions = ["Aatrox", "Ahri", "Akali", "Alistar", "Amumu", "Anivia", "Ashe", "Azir", "Bard", "Blitzcrank", "Brand", "Bravo", "Caitlyn", "Camille", "Cassiopeia", "Darius", "Diana", "Ezreal", "Fiora", "Fizz", "Garen", "Gnar", "Gragas", "Graves", "Gwen", "Hecarim", "Irelia", "Jax", "Jhin", "KaiSa", "Karma", "Kassadin", "Katarina", "LeeSin", "Leona", "Lux", "Malphite", "Nautilus", "Orianna", "Ornn", "Pyke", "Riven", "Sett", "Sylas", "Thresh", "Vayne", "Yone", "Yuumi", "Zed"];

    // 밴픽 순서 정의 (type: ban/pick, team: blue/red, index: slot_index)
    const sequence = [
        {t:'ban', side:'blue', i:0}, {t:'ban', side:'red', i:0}, {t:'ban', side:'blue', i:1}, {t:'ban', side:'red', i:1}, {t:'ban', side:'blue', i:2}, {t:'ban', side:'red', i:2}, // 1페 밴
        {t:'pick', side:'blue', i:0}, {t:'pick', side:'red', i:0}, {t:'pick', side:'red', i:1}, {t:'pick', side:'blue', i:1}, {t:'pick', side:'blue', i:2}, {t:'pick', side:'red', i:2}, // 1페 픽 (1-2-2-1)
        {t:'ban', side:'red', i:3}, {t:'ban', side:'blue', i:3}, {t:'ban', side:'red', i:4}, {t:'ban', side:'blue', i:4}, // 2페 밴
        {t:'pick', side:'red', i:3}, {t:'pick', side:'blue', i:3}, {t:'pick', side:'blue', i:4}, {t:'pick', side:'red', i:4} // 2페 픽 (1-2-1 순서 반영)
    ];

    let step = 0;
    let currentSet = 1;
    let fearlessBans = JSON.parse(sessionStorage.getItem('fearlessBans')) || [];
    let history = JSON.parse(sessionStorage.getItem('draftHistory')) || [];
    let currentDraft = { bluePicks: [], redPicks: [], blueBans: [], redBans: [] };

    function initBoard() {
        // 슬롯 생성
        createSlots('blueBans', 5, 'ban-slot');
        createSlots('redBans', 5, 'ban-slot');
        createSlots('bluePicks', 5, 'pick-slot blue');
        createSlots('redPicks', 5, 'pick-slot red');
        renderChamps();
        updateUI();
    }

    function createSlots(id, count, className) {
        const el = document.getElementById(id);
        el.innerHTML = '';
        for(let i=0; i<count; i++) {
            const div = document.createElement('div');
            div.className = className;
            div.id = `${id}-${i}`;
            el.appendChild(div);
        }
    }

    function renderChamps() {
        const grid = document.getElementById('champGrid');
        grid.innerHTML = '';
        champions.sort().forEach(champ => {
            const isDisabled = fearlessBans.includes(champ) || Object.values(currentDraft).flat().includes(champ);
            const div = document.createElement('div');
            div.className = `champ-item ${isDisabled ? 'disabled' : ''}`;
            div.innerHTML = `<img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/${champ}.png">`;
            div.onclick = () => selectChamp(champ);
            grid.appendChild(div);
        });
    }

    function selectChamp(name) {
        if(step >= sequence.length) return;
        
        const turn = sequence[step];
        const targetList = turn.side + (turn.t === 'ban' ? 'Bans' : 'Picks');
        currentDraft[targetList][turn.i] = name;
        
        step++;
        renderChamps();
        updateUI();
    }

    function updateUI() {
        // 모든 슬롯 초기화 후 데이터 매칭
        ['blueBans', 'redBans', 'bluePicks', 'redPicks'].forEach(key => {
            currentDraft[key].forEach((name, i) => {
                const slot = document.getElementById(`${key}-${i}`);
                if(name) {
                    const imgUrl = key.includes('Picks') 
                        ? `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${name}_0.jpg`
                        : `https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/${name}.png`;
                    slot.innerHTML = `<img src="${imgUrl}"><div class="pick-name">${name}</div>`;
                }
            });
        });

        // 반짝임 효과 제거 및 현재 차례 적용
        document.querySelectorAll('.active-turn').forEach(el => el.classList.remove('active-turn'));
        
        if(step < sequence.length) {
            const turn = sequence[step];
            const activeId = `${turn.side}${turn.t === 'ban' ? 'Bans' : 'Picks'}-${turn.i}`;
            document.getElementById(activeId).classList.add('active-turn');
            document.getElementById('statusText').innerText = `NEXT: ${turn.side.toUpperCase()} ${turn.t.toUpperCase()}`;
            document.getElementById('finishBtn').style.display = 'none';
        } else {
            document.getElementById('statusText').innerText = `밴픽 완료!`;
            document.getElementById('finishBtn').style.display = 'block';
        }
    }

    function finishSet() {
        history.push({ ...currentDraft, set: currentSet });
        fearlessBans = [...fearlessBans, ...currentDraft.bluePicks, ...currentDraft.redPicks];
        
        sessionStorage.setItem('fearlessBans', JSON.stringify(fearlessBans));
        sessionStorage.setItem('draftHistory', JSON.stringify(history));

        // 초기화 후 다음 세트
        currentDraft = { bluePicks: [], redPicks: [], blueBans: [], redBans: [] };
        step = 0;
        currentSet++;
        initBoard();
        renderHistory();
    }

    function renderHistory() {
        const log = document.getElementById('historyLog');
        log.innerHTML = history.slice().reverse().map(h => `
            <div class="history-item">
                <span style="color:var(--lol-gold)">SET ${h.set}</span>
                <span style="color:var(--blue-team)">BLUE: ${h.bluePicks.join(', ')}</span>
                <span style="color:var(--red-team)">RED: ${h.redPicks.join(', ')}</span>
            </div>
        `).join('');
    }

    initBoard();
    renderHistory();
</script>
</body>
</html>
