<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LoL Full Champion Slot</title>
    <style>
        :root {
            --hextech-gold: #c89b3c;
            --hextech-gold-light: #f0e6d2;
            --hextech-blue: #091428;
            --hextech-black: #010a13;
            --border-color: #785a28;
        }

        body {
            background-color: var(--hextech-black);
            color: var(--hextech-gold-light);
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #0a1428 0%, #010a13 100%);
        }

        h1 {
            color: var(--hextech-gold);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(200, 155, 60, 0.4);
        }

        /* 슬롯머신 그리드 컨테이너 */
        .machine-container {
            display: grid;
            grid-template-columns: repeat(5, 130px);
            grid-template-rows: repeat(4, 160px);
            gap: 12px;
            padding: 20px;
            border: 3px solid var(--border-color);
            background: rgba(0, 0, 0, 0.8);
            box-shadow: inset 0 0 50px #000, 0 0 30px rgba(120, 90, 40, 0.5);
            position: relative;
        }

        /* 개별 슬롯 스타일 */
        .slot {
            width: 130px;
            height: 160px;
            background: #050d16;
            border: 1px solid var(--border-color);
            overflow: hidden;
            position: relative;
            box-sizing: border-box;
        }

        /* 상하 그라데이션 오버레이 (회전 효과 극대화) */
        .slot::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, 
                rgba(1,10,19,1) 0%, 
                rgba(1,10,19,0) 20%, 
                rgba(1,10,19,0) 80%, 
                rgba(1,10,19,1) 100%);
            pointer-events: none;
            z-index: 2;
        }

        .slot-inner {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .item {
            width: 130px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            text-align: center;
            color: #cdbe91;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            box-sizing: border-box;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(120, 90, 40, 0.3);
        }

        /* 버튼 스타일 */
        .draw-button {
            margin-top: 40px;
            padding: 15px 60px;
            background: #1e2328;
            color: var(--hextech-gold);
            border: 2px solid var(--hextech-gold);
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.2s;
            letter-spacing: 2px;
            outline: none;
        }

        .draw-button:hover {
            background-color: var(--hextech-gold);
            color: #1e2328;
            box-shadow: 0 0 20px var(--hextech-gold);
        }

        .draw-button:active {
            transform: scale(0.98);
        }

        .draw-button:disabled {
            filter: grayscale(1);
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>Champion Collection</h1>

    <div class="machine-container" id="machine">
        </div>

    <button class="draw-button" onclick="startSpin()">소환하기</button>

    <script>
        // 전 챔피언 리스트 (가나다순)
        const allChampions = [
            "가렌", "갈리오", "갱플랭크", "그라가스", "그레이브즈", "나르", "나미", "나서스", "나피리", "노틸러스", "녹턴", "누누와 윌럼프", "니달리", "니코", "니플라", "다리우스", "다이애나", "드레이븐", "라이즈", "라칸", "람머스", "럭스", "럼블", "레나타 글라스크", "레넥톤", "레오나", "렉사이", "렐", "렌가", "루시안", "루루", "르블랑", "리 신", "리븐", "리산드라", "릴리아", "마스터 이", "마오카이", "말자하", "말파이트", "모데카이저", "모르가나", "문도 박사", "미스 포츈", "밀리오", "바드", "바루스", "바이", "베이가", "베인", "벨코즈", "벨베스", "볼리베어", "브라움", "브랜드", "브라이어", "블라디미르", "블리츠크랭크", "비에고", "빅토르", "뽀삐", "사미라", "사이온", "사일러스", "샤코", "세나", "세라핀", "세주아니", "세트", "소나", "소라카", "쉔", "쉬바나", "스웨인", "스카너", "스몰더", "시비르", "신 짜오", "신드라", "신지드", "쓰레쉬", "아리", "아무무", "아우렐리온 솔", "아이번", "아지르", "아칼리", "아크샨", "아트록스", "아펠리오스", "알리스타", "애니", "애니비아", "애쉬", "야스오", "에코", "엘리스", "오공", "오른", "오리아나", "올라프", "요네", "요릭", "우디르", "우르곳", "워윅", "유미", "이렐리아", "이브린", "이즈리얼", "일라오이", "자르반 4세", "자야", "자이라", "자크", "잔나", "잭스", "제드", "제라스", "제리", "제이스", "조이", "직스", "진", "질리언", "징크스", "초가스", "카르마", "카밀", "카사딘", "카시오페아", "카이사", "카직스", "카타리나", "칼리스타", "케넨", "케이틀린", "케인", "케일", "코그모", "코르키", "퀸", "클레드", "키아나", "킨드레드", "타릭", "탈론", "탈리야", "탐 켄치", "트런들", "트리스타나", "트린다미어", "트위스티드 페이트", "트위치", "티모", "파이크", "판테온", "피들스틱", "피오라", "피즈", "하이머딩거", "헤카림", "흐웨이"
        ];

        const machine = document.getElementById('machine');
        const slotCount = 20;

        // 초기 화면 설정
        for (let i = 0; i < slotCount; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.innerHTML = `<div class="slot-inner" id="inner-${i}"><div class="item">READY</div></div>`;
            machine.appendChild(slot);
        }

        function startSpin() {
            const btn = document.querySelector('.draw-button');
            btn.disabled = true;

            // 1. 결과값 중복 없이 무작위 추출
            const shuffled = [...allChampions].sort(() => 0.5 - Math.random());
            const finalResults = shuffled.slice(0, 20);

            for (let i = 0; i < slotCount; i++) {
                const inner = document.getElementById(`inner-${i}`);
                
                // 2. 애니메이션용 가짜 리스트 생성 (약 15개 정도 스쳐 지나감)
                inner.innerHTML = '';
                const tempItems = [];
                for(let j=0; j<15; j++) {
                    tempItems.push(allChampions[Math.floor(Math.random() * allChampions.length)]);
                }
                tempItems.push(finalResults[i]); // 마지막 정지 화면

                tempItems.forEach(name => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.innerText = name;
                    inner.appendChild(div);
                });

                // 3. 애니메이션 초기화 및 실행
                inner.style.transition = 'none';
                inner.style.transform = `translateY(0)`;
                
                // 브라우저가 렌더링을 인식할 시간을 줌
                setTimeout(() => {
                    const duration = 2 + (Math.random() * 1.5); // 2~3.5초 사이 랜덤 중지
                    const travelDistance = (tempItems.length - 1) * 160;
                    inner.style.transition = `transform ${duration}s cubic-bezier(0.1, 0, 0.1, 1)`;
                    inner.style.transform = `translateY(-${travelDistance}px)`;
                }, 50);
            }

            // 모든 애니메이션이 끝날 즈음 버튼 활성화
            setTimeout(() => {
                btn.disabled = false;
            }, 3600);
        }
    </script>
</body>
</html>
