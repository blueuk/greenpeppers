<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Pepper FC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --toss-blue: #3182f6;
            --toss-gray: #f2f4f6;
            --toss-text: #191f28;
            --toss-sub: #4e5968;
            --white: #ffffff;
        }

        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background: var(--white); 
            margin: 0; 
            color: var(--toss-text); 
            -webkit-font-smoothing: antialiased; 
            overflow-x: hidden;
        }
        
        /* Layout */
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--toss-gray); }
        
        /* 탭 섹션 제어 */
        .tab-content { display: none; padding: 20px; padding-bottom: 120px; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Home 관련 스타일 */
        .rank-card { 
            background: var(--white); border-radius: 24px; padding: 24px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.02); margin-bottom: 24px;
        }
        .rank-badge { background: #e8f3ff; color: var(--toss-blue); padding: 4px 12px; border-radius: 10px; font-weight: bold; font-size: 13px; }
        .user-name { font-size: 26px; font-weight: bold; margin-top: 10px; }

        /* 가로 달력 */
        .scroll-x { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0; scrollbar-width: none; }
        .scroll-x::-webkit-scrollbar { display: none; }
        .date-item { 
            min-width: 55px; background: var(--white); border-radius: 18px; padding: 15px 5px;
            text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer;
        }
        .date-item.active { background: var(--toss-blue); color: white; }

        /* 리스트 스타일 (멤버리스트 등 공통) */
        .list-box { background: var(--white); border-radius: 22px; padding: 10px; margin-top: 10px; }
        .list-item { padding: 18px; border-bottom: 1px solid #f2f4f6; font-weight: 600; display: flex; justify-content: space-between; }
        .member-tag { display: inline-block; padding: 10px 18px; background: var(--toss-gray); border-radius: 14px; margin: 5px; font-weight: 600; font-size: 14px; }

        /* 입력 폼 */
        .name-input { width: 100%; padding: 18px; border-radius: 16px; border: 1px solid #eee; background: var(--white); margin-bottom: 12px; font-size: 16px; box-sizing: border-box; }
        .btn-primary { background: var(--toss-blue); color: white; border: none; padding: 18px; border-radius: 18px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; }

        /* Footer Tab Bar (항상 고정) */
        .tab-bar { 
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            display: grid; grid-template-columns: repeat(5, 1fr);
            padding: 12px 0 30px; border-top: 1px solid #eee; z-index: 1000;
        }
        .tab-btn { text-align: center; color: #b0b8c1; cursor: pointer; font-size: 11px; font-weight: 600; }
        .tab-btn.active { color: var(--toss-blue); }
        .tab-btn i { font-size: 22px; display: block; margin-bottom: 5px; }

        /* 투표 그리드 */
        .vote-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .vote-unit { border: 1px solid #eee; background: white; padding: 15px 5px; border-radius: 15px; text-align: center; font-weight: 600; cursor: pointer; }
        .vote-unit.selected { background: var(--toss-blue); color: white; border-color: var(--toss-blue); }
    </style>
</head>
<body>

<div class="app-container">
    
    <section id="tab-home" class="tab-content active">
        <div id="rankSlider">
            <div class="rank-card">데이터 로딩 중...</div>
        </div>
        <h3 style="margin: 25px 0 10px 5px;">경기 참석 확인</h3>
        <div class="scroll-x" id="satCalendar"></div>
        <div id="dayAttendance" class="list-box" style="min-height: 150px; margin-top: 15px; padding: 20px;">
            <p style="text-align: center; color: #ccc;">날짜를 선택해 주세요.</p>
        </div>
    </section>

    <section id="tab-members" class="tab-content">
        <h2 style="margin-left: 5px;">멤버 명단</h2>
        <div class="list-box" id="fullMemberList"></div>
    </section>

    <section id="tab-add" class="tab-content">
        <h2>새 멤버 추가</h2>
        <div id="inputContainer">
            <input type="text" class="name-input" placeholder="이름 입력">
        </div>
        <button class="btn-primary" style="background:#e8f3ff; color:var(--toss-blue); margin-bottom:10px;" onclick="addInputRow()">+ 이름 입력란 추가</button>
        <button class="btn-primary" onclick="submitNewMembers()">등록 완료</button>
    </section>

    <section id="tab-vote" class="tab-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="voteStepTitle">참석자 선택</h2>
            <span id="voteCountText" style="color:var(--toss-blue); font-weight:bold;">0명</span>
        </div>
        <div class="vote-grid" id="voteMemberGrid"></div>
        <button class="btn-primary" id="voteNextBtn" style="margin-top:20px;" onclick="handleVoteStep()">참석자 선택 완료</button>
    </section>

    <nav class="tab-bar">
        <div class="tab-btn active" onclick="switchTab('home', this)"><i class="fa fa-home"></i>홈</div>
        <div class="tab-btn" onclick="switchTab('members', this)"><i class="fa fa-users"></i>멤버</div>
        <div class="tab-btn" onclick="switchTab('add', this)"><i class="fa fa-plus-circle"></i>추가</div>
        <div class="tab-btn" onclick="switchTab('vote', this)"><i class="fa fa-check-to-slot"></i>투표</div>
        <div class="tab-btn" onclick="window.open('https://youtube.com/@fc_green_pepper')"><i class="fab fa-youtube"></i>유튜브</div>
    </nav>

</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzSTViZcvoCjeHcTcfmdA68wOPYiQKUvOxbHCTI_Ak-tb7JQ6KQq-XXwM7cpV-qagGX/exec";
    let statsData = [];
    let currentVoteStep = 1;
    let voteResults = { 참석: [], 불참: [] };

    window.onload = () => {
        loadInitialData();
        initSatCalendar();
    };

    // 탭 전환 로직
    function switchTab(tabId, el) {
        // 모든 섹션 숨기기
        document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
        // 선택한 섹션 보이기
        document.getElementById('tab-' + tabId).classList.add('active');
        
        // 버튼 활성화 스타일
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');

        // 특정 탭 진입 시 데이터 갱신
        if(tabId === 'members') renderMemberTab();
        if(tabId === 'vote') startVoteProcess();
    }

    // 데이터 로드
    async function loadInitialData() {
        const resp = await fetch(`${WEB_APP_URL}?action=getAllStats`);
        statsData = await resp.json();
        if(statsData.length > 0) {
            renderRankCard(0);
            let idx = 0;
            setInterval(() => {
                idx = (idx + 1) % statsData.length;
                renderRankCard(idx);
            }, 3000);
        }
    }

    // 랭킹 카드 렌더링
    function renderRankCard(idx) {
        const card = document.getElementById('rankSlider');
        const d = statsData[idx];
        card.innerHTML = `
            <div class="rank-card">
                <span class="rank-badge">${d.rank}위</span>
                <div class="user-name">${d.name}</div>
                <div style="display:flex; justify-content:space-between; margin-top:15px; color:var(--toss-sub); font-size:14px;">
                    <span>참석률 ${d.attendanceRate}</span>
                    <span>${d.attendanceCount} / ${d.totalMatches} 경기</span>
                </div>
            </div>
        `;
    }

    // 달력 및 참석자 조회 (기존 로직 유지)
    function initSatCalendar() {
        const container = document.getElementById('satCalendar');
        const today = new Date();
        const year = today.getFullYear();
        let closestFutureSat = null;
        let closestSatEl = null;

        for (let m = 0; m < 12; m++) {
            for (let d = 1; d <= 31; d++) {
                const date = new Date(year, m, d);
                if (date.getDay() === 6 && date.getFullYear() === year && date.getMonth() === m) {
                    const dateStr = date.toISOString().split('T')[0];
                    const item = document.createElement('div');
                    item.className = 'date-item';
                    item.innerHTML = `<span>${m+1}월</span><strong>${date.getDate()}</strong>`;
                    item.onclick = () => fetchDayAtt(dateStr, item);
                    container.appendChild(item);
                    if (!closestFutureSat && date >= today.setHours(0,0,0,0)) {
                        closestFutureSat = dateStr; closestSatEl = item;
                    }
                }
            }
        }
        if(closestSatEl) {
            fetchDayAtt(closestFutureSat, closestSatEl);
            setTimeout(() => closestSatEl.scrollIntoView({behavior:'smooth', inline:'center'}), 500);
        }
    }

    async function fetchDayAtt(date, el) {
        document.querySelectorAll('.date-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        const box = document.getElementById('dayAttendance');
        box.innerHTML = "<p style='text-align:center; color:#ccc;'>조회 중...</p>";
        const resp = await fetch(`${WEB_APP_URL}?action=getAttending&date=${date}`);
        const text = await resp.text();
        box.innerHTML = text ? text.split('|').map(n => `<span class="member-tag">${n}</span>`).join('') : "참석자 없음";
    }

    // 멤버 탭 렌더링 (가나다순)
    function renderMemberTab() {
        const list = document.getElementById('fullMemberList');
        const sorted = [...statsData].sort((a, b) => a.name.localeCompare(b.name, 'ko'));
        list.innerHTML = sorted.map(m => `
            <div class="list-item">
                <span>${m.name}</span>
                <span style="color:var(--toss-blue); font-size:14px;">${m.attendanceRate}</span>
            </div>
        `).join('');
    }

    // 투표 로직
    function startVoteProcess() {
        currentVoteStep = 1;
        voteResults = { 참석: [], 불참: [] };
        document.getElementById('voteStepTitle').innerText = "참석자 선택";
        document.getElementById('voteNextBtn').innerText = "참석자 선택 완료";
        renderVoteGrid(statsData.map(s => s.name).sort());
    }

    function renderVoteGrid(names) {
        const grid = document.getElementById('voteMemberGrid');
        grid.innerHTML = names.map(n => `<div class="vote-unit" onclick="this.classList.toggle('selected'); updateVoteCount();">${n}</div>`).join('');
        updateVoteCount();
    }

    function updateVoteCount() {
        const count = document.querySelectorAll('.vote-unit.selected').length;
        document.getElementById('voteCountText').innerText = count + "명";
    }

    function handleVoteStep() {
        const selected = Array.from(document.querySelectorAll('.vote-unit.selected')).map(el => el.innerText);
        const all = Array.from(document.querySelectorAll('.vote-unit')).map(el => el.innerText);

        if(currentVoteStep === 1) {
            voteResults.참석 = selected;
            currentVoteStep = 2;
            document.getElementById('voteStepTitle').innerText = "불참자 선택";
            document.getElementById('voteNextBtn').innerText = "최종 결과 전송";
            renderVoteGrid(all.filter(n => !selected.includes(n)));
        } else {
            voteResults.불참 = selected;
            if(confirm('투표를 서버로 전송할까요?')) {
                alert('전송 완료!');
                switchTab('home', document.querySelector('.tab-btn'));
            }
        }
    }

    function addInputRow() {
        const container = document.getElementById('inputContainer');
        const input = document.createElement('input');
        input.className = 'name-input';
        input.placeholder = "이름 입력";
        container.appendChild(input);
    }
</script>
</body>
</html>
