<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LoL Dual Mode Slot</title>
    <style>
        :root {
            --hextech-gold: #c89b3c;
            --hextech-border: #785a28;
            --bg-dark: #010a13;
            --slot-height: 180px;
            --slot-width: 115px;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #f0e6d2;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            margin: 0;
            background-image: radial-gradient(circle, #0a1428 0%, #010a13 100%);
        }

        h1 { color: var(--hextech-gold); letter-spacing: 4px; margin-bottom: 5px; }
        .mode-indicator { color: #a0946e; margin-bottom: 25px; font-size: 0.9rem; }

        .main-wrapper { display: flex; flex-direction: column; gap: 20px; }

        /* 섹션 패널 */
        .slot-row-panel {
            display: flex;
            flex-direction: column;
            background: rgba(5, 13, 22, 0.95);
            border: 2px solid var(--hextech-border);
            box-shadow: 0 0 25px rgba(0,0,0,1);
            padding: 12px;
            transition: all 0.5s ease;
        }

        .region-label {
            color: var(--hextech-gold);
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 10px;
            padding-left: 8px;
            letter-spacing: 1px;
            border-left: 3px solid var(--hextech-gold);
        }

        .slots-container { display: flex; gap: 10px; }

        .slot {
            width: var(--slot-width);
            height: var(--slot-height);
            background: #050d16;
            border: 1px solid #3c3c3c;
            overflow: hidden;
            position: relative;
        }

        .slot-inner { display: flex; flex-direction: column; will-change: transform; }

        .item {
            width: var(--slot-width);
            height: var(--slot-height);
            flex-shrink: 0;
            position: relative;
            background-size: cover;
            background-position: center top;
        }

        .champ-name {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            color: #fff; font-size: 11px; text-align: center;
            padding: 10px 0 5px 0; font-weight: bold;
        }

        /* 버튼 그룹 */
        .button-group { display: flex; gap: 15px; margin-top: 30px; }

        .draw-button {
            padding: 15px 35px; background: #1e2328;
            color: var(--hextech-gold); border: 2px solid var(--hextech-gold);
            cursor: pointer; font-size: 1rem; font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .draw-button:hover:not(:disabled) {
            background: var(--hextech-gold); color: #1e2328;
            box-shadow: 0 0 20px var(--hextech-gold);
        }

        /* 테마 버튼 전용 색상 (파란색 계열) */
        .theme-btn { border-color: #00bcff; color: #00bcff; }
        .theme-btn:hover:not(:disabled) { background: #00bcff; color: #1e2328; box-shadow: 0 0 20px #00bcff; }

        .draw-button:disabled { opacity: 0.3; cursor: wait; }
    </style>
</head>
<body>

    <h1>CHAMPION SUMMONER</h1>
    <div class="mode-indicator" id="status-text">소환 방식을 선택하세요</div>

    <div class="main-wrapper" id="main-wrapper"></div>

    <div class="button-group">
        <button class="draw-button" onclick="launchSummon('all')">전체 랜덤 소환</button>
        <button class="draw-button theme-btn" onclick="launchSummon('regional')">지역 테마 소환</button>
    </div>

    <script>
        // 전 챔피언 데이터 (일부 생략, 실제 사용 시 위쪽의 전체 리스트를 넣으시면 됩니다)
        const allChampsPool = [
            {ko:"가렌", en:"Garen"}, {ko:"럭스", en:"Lux"}, {ko:"카이사", en:"Kaisa"}, {ko:"말자하", en:"Malzahar"},
            {ko:"제이스", en:"Jayce"}, {ko:"바이", en:"Vi"}, {ko:"징크스", en:"Jinx"}, {ko:"에코", en:"Ekko"},
            {ko:"아칼리", en:"Akali"}, {ko:"야스오", en:"Yasuo"}, {ko:"이렐리아", en:"Irelia"}, {ko:"다리우스", en:"Darius"},
            {ko:"비에고", en:"Viego"}, {ko:"쓰레쉬", en:"Thresh"}, {ko:"아지르", en:"Azir"}, {ko:"애쉬", en:"Ashe"},
            {ko:"암베사", en:"Ambessa"}, {ko:"흐웨이", en:"Hwei"}, {ko:"요네", en:"Yone"}, {ko:"세트", en:"Sett"}
            // ... (전체 챔피언 리스트를 여기에 넣으세요)
        ];

        const regions = [
            { name: "공허 (The Void)", champs: [{ko:"카이사", en:"Kaisa"}, {ko:"말자하", en:"Malzahar"}, {ko:"벨코즈", en:"Velkoz"}, {ko:"카직스", en:"Khazix"}, {ko:"렉사이", en:"RekSai"}]},
            { name: "필트오버 & 자운", champs: [{ko:"바이", en:"Vi"}, {ko:"징크스", en:"Jinx"}, {ko:"에코", en:"Ekko"}, {ko:"제이스", en:"Jayce"}, {ko:"케이틀린", en:"Caitlyn"}]},
            { name: "아이오니아", champs: [{ko:"아칼리", en:"Akali"}, {ko:"야스오", en:"Yasuo"}, {ko:"이렐리아", en:"Irelia"}, {ko:"리 신", en:"LeeSin"}, {ko:"아리", en:"Ahri"}]},
            { name: "데마시아", champs: [{ko:"가렌", en:"Garen"}, {ko:"럭스", en:"Lux"}, {ko:"자르반 4세", en:"JarvanIV"}, {ko:"피오라", en:"Fiora"}, {ko:"베인", en:"Vayne"}]},
            { name: "녹서스", champs: [{ko:"다리우스", en:"Darius"}, {ko:"드레이븐", en:"Draven"}, {ko:"카타리나", en:"Katarina"}, {ko:"스웨인", en:"Swain"}, {ko:"모데카이저", en:"Mordekaiser"}]},
            { name: "슈리마", champs: [{ko:"아지르", en:"Azir"}, {ko:"나서스", en:"Nasus"}, {ko:"레넥톤", en:"Renekton"}, {ko:"시비르", en:"Sivir"}, {ko:"크산테", en:"Ksante"}]},
            { name: "그림자 군도", champs: [{ko:"비에고", en:"Viego"}, {ko:"쓰레쉬", en:"Thresh"}, {ko:"헤카림", en:"Hecarim"}, {ko:"카서스", en:"Karthus"}, {ko:"그웬", en:"Gwen"}]},
            { name: "프렐요드", champs: [{ko:"애쉬", en:"Ashe"}, {ko:"세주아니", en:"Sejuani"}, {ko:"리산드라", en:"Lissandra"}, {ko:"브라움", en:"Braum"}, {ko:"볼리베어", en:"Volibear"}]}
        ];

        const wrapper = document.getElementById('main-wrapper');
        const itemHeight = 180;

        // 초기 인터페이스 생성
        for (let r = 0; r < 4; r++) {
            const rowPanel = document.createElement('div');
            rowPanel.className = 'slot-row-panel';
            rowPanel.innerHTML = `
                <div class="region-label" id="label-${r}">SQUAD ${r+1}</div>
                <div class="slots-container" id="container-${r}"></div>
            `;
            const container = rowPanel.querySelector('.slots-container');
            for (let s = 0; s < 5; s++) {
                const idx = (r * 5) + s;
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.innerHTML = `<div class="slot-inner" id="inner-${idx}"><div class="item" style="background-image:url('https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Aatrox_0.jpg')"><div class="champ-name">READY</div></div></div>`;
                container.appendChild(slot);
            }
            wrapper.appendChild(rowPanel);
        }

        function launchSummon(mode) {
            const btns = document.querySelectorAll('.draw-button');
            btns.forEach(b => b.disabled = true);
            
            let selectedRegions = [];
            if (mode === 'regional') {
                selectedRegions = [...regions].sort(() => 0.5 - Math.random()).slice(0, 4);
                document.getElementById('status-text').innerText = "지역별 특화 소환 진행 중...";
            } else {
                document.getElementById('status-text').innerText = "전체 무작위 소환 진행 중...";
            }

            for (let r = 0; r < 4; r++) {
                let pool = [];
                if (mode === 'regional') {
                    pool = selectedRegions[r].champs;
                    document.getElementById(`label-${r}`).innerText = selectedRegions[r].name;
                    document.getElementById(`label-${r}`).style.color = "#00bcff";
                } else {
                    pool = allChampsPool;
                    document.getElementById(`label-${r}`).innerText = `RANDOM SQUAD ${r+1}`;
                    document.getElementById(`label-${r}`).style.color = "var(--hextech-gold)";
                }

                for (let s = 0; s < 5; s++) {
                    const slotIdx = (r * 5) + s;
                    const inner = document.getElementById(`inner-${slotIdx}`);
                    inner.innerHTML = '';
                    
                    const scrollCount = 20;
                    const resultChamp = pool[Math.floor(Math.random() * pool.length)];

                    for(let j=0; j <= scrollCount; j++) {
                        const champ = (j === scrollCount) ? resultChamp : pool[Math.floor(Math.random() * pool.length)];
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.style.backgroundImage = `url('https://ddragon.leagueoflegends.com/cdn/img/champion/loading/${champ.en}_0.jpg')`;
                        div.innerHTML = `<div class="champ-name">${champ.ko}</div>`;
                        inner.appendChild(div);
                    }

                    inner.style.transition = 'none';
                    inner.style.transform = `translateY(0)`;

                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            const duration = 2.5 + (Math.random() * 1.5); 
                            inner.style.transition = `transform ${duration}s cubic-bezier(0.1, 0, 0.1, 1)`;
                            inner.style.transform = `translateY(-${scrollCount * itemHeight}px)`;
                        });
                    });
                }
            }
            setTimeout(() => { btns.forEach(b => b.disabled = false); }, 4500);
        }
    </script>
</body>
</html>
