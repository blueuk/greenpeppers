<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Pepper FC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --toss-blue: #3182f6;
            --toss-gray: #f2f4f6;
            --toss-text: #191f28;
            --toss-sub: #4e5968;
            --white: #ffffff;
        }

        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--toss-gray); margin: 0; color: var(--toss-text); -webkit-font-smoothing: antialiased; }
        
        /* Layout */
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .content { flex: 1; padding: 20px; padding-bottom: 100px; }

        /* Header Card (Toss Style) */
        .rank-card { 
            background: var(--white); border-radius: 24px; padding: 24px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 20px;
            cursor: pointer; transition: transform 0.2s ease;
        }
        .rank-card:active { transform: scale(0.98); }
        .rank-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .rank-badge { background: #e8f3ff; color: var(--toss-blue); padding: 4px 12px; border-radius: 10px; font-weight: bold; font-size: 13px; }
        .rank-main { display: flex; justify-content: space-between; align-items: flex-end; }
        .user-name { font-size: 24px; font-weight: bold; }
        .stat-details { text-align: right; color: var(--toss-sub); font-size: 14px; line-height: 1.6; }

        /* Horizontal Calendar */
        .cal-section { margin: 24px 0; }
        .cal-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; padding-left: 4px; }
        .scroll-x { display: flex; overflow-x: auto; gap: 12px; padding: 4px; scrollbar-width: none; }
        .scroll-x::-webkit-scrollbar { display: none; }
        .date-item { 
            min-width: 55px; background: var(--white); border-radius: 16px; padding: 12px 8px;
            text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer;
        }
        .date-item.active { background: var(--toss-blue); color: var(--white); }
        .date-item span { display: block; font-size: 12px; margin-bottom: 4px; opacity: 0.8; }
        .date-item strong { font-size: 17px; }

        /* Attendance List */
        .att-list { background: var(--white); border-radius: 20px; padding: 16px; min-height: 100px; }
        .member-tag { display: inline-block; padding: 8px 16px; background: var(--toss-gray); border-radius: 12px; margin: 4px; font-weight: 600; font-size: 14px; }

        /* Footer Tab Bar */
        .tab-bar { 
            position: fixed; bottom: 0; width: 100%; max-width: 500px; 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            display: grid; grid-template-columns: repeat(5, 1fr);
            padding: 10px 0 25px; border-top: 1px solid #eee;
        }
        .tab-item { text-align: center; color: #b0b8c1; cursor: pointer; font-size: 10px; font-weight: bold; }
        .tab-item.active { color: var(--toss-blue); }
        .tab-item i { font-size: 20px; display: block; margin-bottom: 4px; }

        /* Full Screen Modals */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--white); z-index: 2000; display: none; flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }
        .modal-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f2f4f6; }
        .modal-body { flex: 1; padding: 20px; overflow-y: auto; }
        .btn-confirm { background: var(--toss-blue); color: white; border: none; padding: 16px; border-radius: 16px; font-size: 16px; font-weight: bold; width: 100%; margin-top: 10px; }

        /* Voting Process UI */
        .vote-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .vote-btn { 
            border: 1px solid #eee; background: white; padding: 12px 4px; border-radius: 12px; 
            font-size: 14px; font-weight: 500; cursor: pointer; text-align: center;
        }
        .vote-btn.selected { background: var(--toss-blue); color: white; border-color: var(--toss-blue); }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="content">
        <div id="rankSlider">
            <div class="rank-card">
                <div style="text-align: center; color: #adb5bd;">데이터 동기화 중...</div>
            </div>
        </div>

        <div class="cal-section">
            <div class="cal-title">경기 참석 확인</div>
            <div class="scroll-x" id="satCalendar"></div>
        </div>

        <div class="att-list" id="dayAttendance">
            <p style="text-align: center; color: #adb5bd; font-size: 14px;">날짜를 선택해 주세요</p>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="location.reload()"><i class="fa fa-home"></i>홈</div>
        <div class="tab-item" onclick="showModal('modalMembers')"><i class="fa fa-users"></i>멤버</div>
        <div class="tab-item" onclick="showModal('modalAdd')"><i class="fa fa-plus-circle"></i>추가</div>
        <div class="tab-item" onclick="showModal('modalVote')"><i class="fa fa-check-to-slot"></i>투표</div>
        <div class="tab-item" onclick="window.open('https://youtube.com/@fc_green_pepper')"><i class="fab fa-youtube"></i>유튜브</div>
    </div>
</div>

<div id="modalMembers" class="modal">
    <div class="modal-header"><h3>멤버 리스트</h3><i class="fa fa-times" onclick="hideModal()"></i></div>
    <div class="modal-body" id="memberListBody"></div>
</div>

<div id="modalAdd" class="modal">
    <div class="modal-header"><h3>멤버 추가</h3><i class="fa fa-times" onclick="hideModal()"></i></div>
    <div class="modal-body">
        <div id="inputGroup">
            <input type="text" class="name-input" placeholder="이름 입력" style="width:calc(100% - 30px); padding:15px; border-radius:12px; border:1px solid #eee; margin-bottom:10px;">
        </div>
        <button class="btn-confirm" style="background:#f2f4f6; color:#4e5968;" onclick="addInput()">+ 멤버 추가 행 추가</button>
        <button class="btn-confirm" onclick="submitMembers()">서버로 전송하기</button>
    </div>
</div>

<div id="modalVote" class="modal">
    <div class="modal-header"><h3 id="voteTitle">참석자 선택</h3><span id="voteCount">0명</span></div>
    <div class="modal-body">
        <div class="vote-grid" id="voteMemberGrid"></div>
        <button id="voteNextBtn" class="btn-confirm" onclick="nextVoteStep()">참석자 선택 완료</button>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzSTViZcvoCjeHcTcfmdA68wOPYiQKUvOxbHCTI_Ak-tb7JQ6KQq-XXwM7cpV-qagGX/exec";
    let statsData = [];
    let currentVoteStep = 1; // 1:참석, 2:불참, 3:전송
    let voteResults = { 참석: [], 불참: [], 미투표: [] };

    window.onload = () => {
        loadStats();
        initSatCalendar();
    };

    // 1. 랭킹 데이터 로드 및 롤링
    async function loadStats() {
        const resp = await fetch(`${WEB_APP_URL}?action=getAllStats`);
        statsData = await resp.json();
        renderRankCard(0);
        
        let idx = 0;
        setInterval(() => {
            idx = (idx + 1) % statsData.length;
            renderRankCard(idx);
        }, 3000);
    }

    function renderRankCard(idx) {
        const container = document.getElementById('rankSlider');
        const d = statsData[idx];
        container.innerHTML = `
            <div class="rank-card" onclick="alert('${d.name} 선수의 상세 그래프는 준비 중입니다.')">
                <div class="rank-header">
                    <span class="rank-badge">${d.rank}위</span>
                    <i class="fa fa-chevron-right" style="color:#ccc"></i>
                </div>
                <div class="rank-main">
                    <div>
                        <div style="color:var(--toss-sub); font-size:14px; margin-bottom:4px;">참석률 ${d.attendanceRate}</div>
                        <div class="user-name">${d.name}</div>
                    </div>
                    <div class="stat-details">
                        게임수: ${d.totalMatches}회<br>참석수: ${d.attendanceCount}회
                    </div>
                </div>
            </div>
        `;
    }

    // 2. 가로형 토요일 달력 (당해 토요일만)
    function initSatCalendar() {
        const container = document.getElementById('satCalendar');
        const start = new Date(new Date().getFullYear(), 0, 1);
        const end = new Date(new Date().getFullYear(), 11, 31);
        
        for (let d = start; d <= end; d.setDate(d.getDate() + 1)) {
            if (d.getDay() === 6) { // 토요일
                const dateStr = d.toISOString().split('T')[0];
                const item = document.createElement('div');
                item.className = 'date-item';
                item.innerHTML = `<span>${d.getMonth()+1}월</span><strong>${d.getDate()}</strong>`;
                item.onclick = () => fetchDayAttendance(dateStr, item);
                container.appendChild(item);
            }
        }
    }

    async function fetchDayAttendance(date, el) {
        document.querySelectorAll('.date-item').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
        const res = await fetch(`${WEB_APP_URL}?action=getAttending&date=${date}`);
        const names = await res.text();
        const list = document.getElementById('dayAttendance');
        list.innerHTML = names ? names.split('|').map(n => `<span class="member-tag">${n}</span>`).join('') : "참석자가 없습니다.";
    }

    // 3. 투표 프로세스 (단계별)
    function startVote() {
        currentVoteStep = 1;
        voteResults = { 참석: [], 불참: [], 미투표: [] };
        renderVoteGrid(statsData.map(s => s.name).sort());
    }

    function renderVoteGrid(names) {
        const grid = document.getElementById('voteMemberGrid');
        grid.innerHTML = names.map(name => `<div class="vote-btn" onclick="toggleVote(this, '${name}')">${name}</div>`).join('');
    }

    function toggleVote(el, name) {
        el.classList.toggle('selected');
        const count = document.querySelectorAll('.vote-btn.selected').length;
        document.getElementById('voteCount').innerText = count + "명";
    }

    async function nextVoteStep() {
        const selected = Array.from(document.querySelectorAll('.vote-btn.selected')).map(el => el.innerText);
        const allCurrent = Array.from(document.querySelectorAll('.vote-btn')).map(el => el.innerText);

        if (currentVoteStep === 1) {
            voteResults.참석 = selected;
            const remaining = allCurrent.filter(n => !selected.includes(n));
            currentVoteStep = 2;
            document.getElementById('voteTitle').innerText = "불참자 선택";
            document.getElementById('voteCount').innerText = "0명";
            document.getElementById('voteNextBtn').innerText = "최종 전송";
            renderVoteGrid(remaining);
        } else {
            voteResults.불참 = selected;
            voteResults.미투표 = allCurrent.filter(n => !selected.includes(n));
            if(confirm('투표를 전송할까요?')) {
                // 전송 로직 (GAS 호출 루프)
                alert('전송을 시작합니다. 잠시만 기다려주세요.');
                hideModal();
            }
        }
    }

    // Modal helpers
    function showModal(id) { 
        document.getElementById(id).style.display = 'flex'; 
        if(id === 'modalMembers') renderFullMembers();
        if(id === 'modalVote') startVote();
    }
    function hideModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    
    function renderFullMembers() {
        const body = document.getElementById('memberListBody');
        const sorted = statsData.map(s => s.name).sort();
        body.innerHTML = sorted.map(n => `<div style="padding:15px; border-bottom:1px solid #f2f4f6; font-weight:500;">${n}</div>`).join('');
    }

    function addInput() {
        const group = document.getElementById('inputGroup');
        const input = document.createElement('input');
        input.className = 'name-input';
        input.placeholder = "이름 입력";
        input.style = "width:calc(100% - 30px); padding:15px; border-radius:12px; border:1px solid #eee; margin-bottom:10px;";
        group.appendChild(input);
    }
</script>
</body>
</html>
