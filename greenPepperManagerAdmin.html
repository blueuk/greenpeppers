<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenPeppers Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f2f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .admin-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            width: 100%;
            max-width: 320px;
        }
        h1 { font-size: 24px; color: #191f28; margin-bottom: 8px; }
        p { color: #4e5968; font-size: 15px; margin-bottom: 32px; }
        
        .admin-button {
            background-color: #3182f6;
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .admin-button:hover { background-color: #1b64da; }
    </style>
</head>
<body>

<div class="admin-card">
    <h1>관리자 모드</h1>
    <p>풋고추FC 팀 관리자로 접속하시겠습니까?</p>
    <button class="admin-button" onclick="enterAdminMode()">관리자 접속</button>
</div>

<script>
    function enterAdminMode() {
        // 세션 스토리지에 관리자 인증 표식 저장 (브라우저 탭 닫으면 소멸)
        sessionStorage.setItem('isAdminAuthenticated', 'true');
        
        // 실제 관리 페이지로 리다이렉트
        window.location.href = "https://blueuk.github.io/greenpeppers/greenPepperManager.html";
    }
</script>

</body>
</html>
