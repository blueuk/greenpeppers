<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenPeppers 통합 관리</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #f39c12;
            --gray: #6c757d;
        }
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        
        .tab-menu { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; cursor: pointer; color: #666; font-weight: bold; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

        .section { display: none; }
        .section.active { display: block; }

        .step-title { font-weight: bold; color: var(--primary); margin: 15px 0; font-size: 1.1rem; }
        .member-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; min-height: 80px; padding: 10px; border: 1px dashed #ccc; border-radius: 8px; }
        
        .m-btn { border: 2px solid #ddd; background: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .m-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        .action-btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-blue { background: var(--primary); }
        .btn-red { background: var(--danger); }
        .btn-orange { background: var(--warning); }
        
        select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 10px; }
        .vote-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

        #status { margin-top: 20px; padding: 12px; border-radius: 8px; text-align: center; font-size: 14px; background: #f8f9fa; line-height: 1.6; min-height: 24px; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚽ GreenPeppers 투표 관리</h2>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="openTab('multi')">다수 투표</button>
        <button class="tab-btn" onclick="openTab('single')">개별 투표</button>
        <button class="tab-btn" onclick="openTab('admin')">설정</button>
    </div>

    <div id="multi" class="section active">
        <div id="step1">
            <div class="step-title">1단계: 참석 멤버 선택</div>
            <div id="container1" class="member-container">명단 로딩 중...</div>
            <button class="action-btn btn-blue" onclick="goToStep2()">참석자 선택 완료 (다음)</button>
        </div>
        <div id="step2" style="display:none;">
            <div class="step-title">2단계: 불참 멤버 선택</div>
            <div id="container2" class="member-container"></div>
            <button class="action-btn btn-blue" onclick="finalSubmit()">최종 결과 전송 (미선택은 미투표)</button>
            <button class="action-btn" style="background:#ccc;" onclick="resetMulti()">처음으로</button>
        </div>
    </div>

    <div id="single" class="section">
        <div class="step-title">멤버별 투표 업데이트</div>
        <select id="singleMemberSelect">
            <option value="">멤버를 불러오는 중...</option>
        </select>
        <div class="vote-grid">
            <button onclick="sendSingleVote('참석')" class="m-btn" style="border-color:var(--success)">참석(O)</button>
            <button onclick="sendSingleVote('불참')" class="m-btn" style="border-color:var(--danger)">불참(X)</button>
            <button onclick="sendSingleVote('미투표')" class="m-btn" style="border-color:var(--gray)">미투표(N)</button>
        </div>
    </div>

    <div id="admin" class="section">
        <div class="step-title">특수 상황 관리</div>
        <p style="font-size: 13px; color: #666;">전원을 대상으로 경기 미진행(R) 값을 입력합니다.</p>
        <button class="action-btn btn-orange" onclick="cancelMatch()">경기 미진행 처리 (전원 R)</button>
    </div>

    <div id="status">명단을 불러오는 중입니다...</div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzSTViZcvoCjeHcTcfmdA68wOPYiQKUvOxbHCTI_Ak-tb7JQ6KQq-XXwM7cpV-qagGX/exec";
    
    let allMembers = [];
    let attending = [];

    window.onload = loadMembers;

    function openTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    async function loadMembers() {
        const status = document.getElementById('status');
        try {
            const response = await fetch(`${WEB_APP_URL}?action=getMembers`);
            const data = await response.text();
            allMembers = data.split('|').filter(n => n.trim() !== "");
            
            // 탭별 렌더링
            renderMultiStep(1, allMembers, 'container1');
            updateSingleSelect();
            
            status.innerText = "명단 로드 완료.";
        } catch (e) {
            status.innerText = "명단 로드 실패.";
        }
    }

    // --- 다수 투표 로직 ---
    function renderMultiStep(step, list, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        list.forEach(name => {
            const btn = document.createElement('button');
            btn.innerText = name;
            btn.className = 'm-btn';
            btn.onclick = () => btn.classList.toggle('selected');
            container.appendChild(btn);
        });
    }

    function goToStep2() {
        const btns = document.querySelectorAll('#container1 .m-btn');
        attending = Array.from(btns).filter(b => b.classList.contains('selected')).map(b => b.innerText);
        const remaining = allMembers.filter(m => !attending.includes(m));
        
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        renderMultiStep(2, remaining, 'container2');
    }

    async function finalSubmit() {
        const btns = document.querySelectorAll('#container2 .m-btn');
        const absent = Array.from(btns).filter(b => b.classList.contains('selected')).map(b => b.innerText);
        const noVote = allMembers.filter(m => !attending.includes(m) && !absent.includes(m));

        if (!confirm('전송하시겠습니까?')) return;
        
        await processBatch([
            { list: attending, type: '참석' },
            { list: absent, type: '불참' },
            { list: noVote, type: '미투표' }
        ]);
        resetMulti();
    }

    function resetMulti() {
        document.getElementById('step1').style.display = 'block';
        document.getElementById('step2').style.display = 'none';
        renderMultiStep(1, allMembers, 'container1');
    }

    // --- 개별 투표 로직 ---
    function updateSingleSelect() {
        const select = document.getElementById('singleMemberSelect');
        select.innerHTML = '<option value="">-- 멤버 선택 --</option>';
        allMembers.forEach(name => {
            const opt = document.createElement('option');
            opt.value = opt.innerText = name;
            select.appendChild(opt);
        });
    }

    async function sendSingleVote(type) {
        const name = document.getElementById('singleMemberSelect').value;
        if (!name) return alert("멤버를 선택하세요");
        
        document.getElementById('status').innerText = `${name}님 ${type} 전송 중...`;
        await postVote(name, type);
        document.getElementById('status').innerText = `${name}님 완료!`;
    }

    // --- 경기 미진행 (전원 R) ---
    async function cancelMatch() {
        if (!confirm("모든 멤버의 오늘 투표를 '경기 미진행(R)'으로 처리하시겠습니까?")) return;
        
        await processBatch([{ list: allMembers, type: '경기 미진행' }]);
    }

    // --- 공통 전송 엔진 ---
    async function processBatch(groups) {
        const status = document.getElementById('status');
        let total = 0;
        groups.forEach(g => total += g.list.length);
        let count = 0;

        for (let group of groups) {
            for (let name of group.list) {
                count++;
                status.innerText = `전송 중... (${count}/${total}) - ${name}`;
                await postVote(name, group.type);
            }
        }
        status.innerText = "🎉 모든 처리가 완료되었습니다!";
    }

    async function postVote(name, voteStatus) {
        // GAS doPost에서 status가 '경기 미진행'이면 R을 입력하도록 처리되어야 함
        let statusChar = voteStatus;
        if (voteStatus === '경기 미진행') statusChar = 'R';

        return fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                action: 'vote',
                name: name,
                status: statusChar
            })
        });
    }
</script>

</body>
</html>
