<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
    :root { --toss-blue: #3182f6; --toss-gray: #f2f4f6; --toss-dark-gray: #8b95a1; --toss-text: #191f28; }
    body { background-color: var(--toss-gray); color: var(--toss-text); font-family: 'Noto Sans KR', sans-serif; padding-bottom: 90px; }
    
    .toss-card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: none; }
    .page { display: none; animation: fadeIn 0.3s ease-in-out; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* 랭킹 카드 스타일 */
    .rank-item { display: flex; align-items: center; justify-content: space-between; }
    .rank-info { display: flex; flex-direction: column; }
    .rank-number { font-size: 1.2rem; font-weight: 700; color: var(--toss-blue); margin-right: 15px; }

    /* 달력 스타일 */
    .horizontal-cal { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; -webkit-overflow-scrolling: touch; }
    .horizontal-cal::-webkit-scrollbar { display: none; }
    .cal-item { min-width: 70px; background: white; padding: 12px; border-radius: 18px; text-align: center; cursor: pointer; transition: 0.2s; }
    .cal-item.active { background: var(--toss-blue); color: white; }

    /* 푸터 내비게이션 */
    .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 10px 0 25px 0; border-top: 1px solid #eee; z-index: 1000; }
    .nav-item { text-align: center; font-size: 11px; color: var(--toss-dark-gray); text-decoration: none; cursor: pointer; flex: 1; }
    .nav-item.active { color: var(--toss-blue); font-weight: 700; }
    .nav-icon { font-size: 20px; margin-bottom: 4px; }

    /* 버튼 및 인풋 */
    .btn-toss { background: var(--toss-blue); color: white; border-radius: 16px; padding: 14px; width: 100%; border: none; font-weight: 700; }
    .form-control { border-radius: 12px; background: var(--toss-gray); border: none; padding: 12px; }
    .member-btn { border: 1px solid #ddd; background: white; padding: 10px 15px; border-radius: 20px; margin: 4px; font-size: 14px; }
    .member-btn.selected { background: var(--toss-blue); color: white; border-color: var(--toss-blue); }
  </style>
</head>
<body>

<div class="container mt-4">
  <div id="home" class="page active">
    <h4 class="fw-bold mb-3">올해의 랭킹 🏆</h4>
    <div id="rankList"></div>
    
    <h5 class="fw-bold mt-4">경기 일정</h5>
    <div class="horizontal-cal" id="calendar"></div>
    <div class="toss-card mt-2">
      <div id="selectedDateTitle" class="fw-bold mb-2">날짜를 선택하세요</div>
      <div id="attendeesList" class="text-muted small"></div>
    </div>
  </div>

  <div id="memberList" class="page">
    <h4 class="fw-bold mb-3">멤버 목록</h4>
    <div id="fullMemberList"></div>
  </div>

  <div id="addMember" class="page">
    <h4 class="fw-bold mb-3">멤버 추가</h4>
    <div class="toss-card">
      <div id="nameInputs">
        <input type="text" class="form-control mb-2 member-name-input" placeholder="멤버 이름 입력">
      </div>
      <button class="btn btn-outline-primary btn-sm w-100 mt-2" onclick="addNameField()">+ 추가 입력</button>
      <button class="btn-toss mt-4" onclick="submitMembers()">멤버 등록하기</button>
    </div>
  </div>

  <div id="voteInput" class="page">
    <h4 class="fw-bold mb-3" id="voteStepTitle">1. 참석자 선택</h4>
    <div class="toss-card">
      <div id="voteMemberContainer"></div>
      <div id="voteSelectionCount" class="mt-3 text-primary fw-bold">선택: 0명</div>
      <button class="btn-toss mt-3" id="nextVoteBtn" onclick="nextVoteStep()">확인</button>
    </div>
  </div>

  <div id="scoreInput" class="page">
    <h4 class="fw-bold mb-3">점수 입력</h4>
    <div class="toss-card">
      <select id="scoreMemberSelect" class="form-control mb-3" onchange="loadMemberScores()">
        <option value="">멤버를 선택하세요</option>
      </select>
      <div id="scoreItems"></div>
      <button class="btn-toss mt-3" onclick="submitScores()">점수 저장</button>
    </div>
  </div>
</div>

<nav class="footer-nav">
  <div class="nav-item active" onclick="switchPage('home')"><div class="nav-icon">🏠</div>홈</div>
  <div class="nav-item" onclick="switchPage('memberList')"><div class="nav-icon">👥</div>목록</div>
  <div class="nav-item" onclick="switchPage('addMember')"><div class="nav-icon">➕</div>추가</div>
  <div class="nav-item" onclick="switchPage('scoreInput')"><div class="nav-icon">🎯</div>점수</div>
  <div class="nav-item" onclick="switchPage('voteInput')"><div class="nav-icon">✅</div>투표</div>
  <div class="nav-item" onclick="window.open('https://youtube.com/@fc_green_pepper?si=pcmvE6Msb2iINPNR')"><div class="nav-icon">📺</div>유튜브</div>
</nav>

<div class="modal fade" id="abilityModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0" style="border-radius: 24px;">
      <div class="modal-body p-4">
        <h5 id="modalMemberName" class="fw-bold mb-3">멤버 정보</h5>
        <div id="abilityContent" class="small"></div>
        <button class="btn-toss mt-4" data-bs-dismiss="modal">닫기</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let appData = { stats: [], members: [] };
  let selectedVoteDate = "";
  let voteStep = 1; // 1: 참석, 2: 불참
  let tempVotes = {};

  window.onload = () => {
    loadData();
    renderCalendar();
  };

  function loadData() {
    google.script.run.withSuccessHandler(data => {
      appData = data;
      renderHome();
      updateDropdowns();
    }).getAppData();
  }

  function renderHome() {
    const list = document.getElementById('rankList');
    list.innerHTML = appData.stats.map(s => `
      <div class="toss-card" onclick="showAbility('${s.name}')">
        <div class="rank-item">
          <div class="d-flex align-items-center">
            <span class="rank-number">${s.rank}위</span>
            <div class="rank-info">
              <span class="fw-bold">${s.name}</span>
              <span class="text-muted small">참석: ${s.attended}회 / 게임: ${s.totalMatches}회</span>
            </div>
          </div>
          <div class="text-end">
            <div class="fw-bold text-primary">${s.rate}%</div>
          </div>
        </div>
      </div>
    `).join('');
  }

  function renderCalendar() {
    const cal = document.getElementById('calendar');
    const today = new Date();
    const currentYear = today.getFullYear();
    let saturdays = [];
    
    for (let month = 0; month < 12; month++) {
      let d = new Date(currentYear, month, 1);
      while (d.getDay() !== 6) d.setDate(d.getDate() + 1);
      while (d.getFullYear() === currentYear) {
        saturdays.push(new Date(d));
        d.setDate(d.getDate() + 7);
      }
    }

    cal.innerHTML = saturdays.map(d => {
      const dStr = d.toISOString().split('T')[0];
      const isToday = Math.abs(d - today) < 7 * 24 * 60 * 60 * 1000 && d.getDay() === 6;
      return `<div class="cal-item ${isToday ? 'active' : ''}" onclick="selectDate(this, '${dStr}')">
                <div style="font-size:10px">${d.getMonth()+1}월</div>
                <div class="fw-bold">${d.getDate()}</div>
              </div>`;
    }).join('');
    
    // 초기 날짜 자동 선택
    const activeItem = cal.querySelector('.active');
    if(activeItem) activeItem.click();
  }

  function selectDate(el, dateStr) {
    document.querySelectorAll('.cal-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    selectedVoteDate = dateStr;
    document.getElementById('selectedDateTitle').innerText = dateStr + " 명단";
    google.script.run.withSuccessHandler(list => {
      document.getElementById('attendeesList').innerText = list.length > 0 ? list.join(', ') : "참석자 정보 없음";
    }).getVoteStatusByDate(dateStr);
  }

  function switchPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    event.currentTarget.classList.add('active');
    
    if(pageId === 'memberList') renderFullList();
    if(pageId === 'voteInput') startVoteProcess();
  }

  function renderFullList() {
    const list = document.getElementById('fullMemberList');
    list.innerHTML = appData.members.map(m => `
      <div class="toss-card py-2 px-3 fw-medium">${m}</div>
    `).join('');
  }

  // 멤버 추가 로직
  function addNameField() {
    const input = document.createElement('input');
    input.className = "form-control mb-2 member-name-input";
    input.placeholder = "멤버 이름 입력";
    document.getElementById('nameInputs').appendChild(input);
  }

  function submitMembers() {
    const names = Array.from(document.querySelectorAll('.member-name-input')).map(i => i.value).filter(v => v);
    if(names.length === 0) return alert("이름을 입력하세요.");
    google.script.run.withSuccessHandler(() => {
      alert("등록 완료!");
      location.reload();
    }).addMembers(names);
  }

  // 투표 프로세스
  function startVoteProcess() {
    voteStep = 1;
    tempVotes = {};
    appData.members.forEach(m => tempVotes[m] = 'N');
    document.getElementById('voteStepTitle').innerText = "1. 참석자 선택";
    renderVoteButtons();
  }

  function renderVoteButtons() {
    const container = document.getElementById('voteMemberContainer');
    container.innerHTML = appData.members.map(m => `
      <button class="member-btn ${tempVotes[m] === 'O' || tempVotes[m] === 'X' ? 'selected' : ''}" 
              onclick="toggleVote('${m}')">${m}</button>
    `).join('');
    updateVoteCount();
  }

  function toggleVote(name) {
    if(voteStep === 1) tempVotes[name] = (tempVotes[name] === 'O' ? 'N' : 'O');
    else if(voteStep === 2 && tempVotes[name] !== 'O') tempVotes[name] = (tempVotes[name] === 'X' ? 'N' : 'X');
    renderVoteButtons();
  }

  function nextVoteStep() {
    if(voteStep === 1) {
      voteStep = 2;
      document.getElementById('voteStepTitle').innerText = "2. 불참자 선택";
    } else {
      if(!selectedVoteDate) return alert("달력에서 날짜를 먼저 선택하세요.");
      google.script.run.withSuccessHandler(() => {
        alert("투표가 저장되었습니다.");
        switchPage('home');
      }).saveVotes(selectedVoteDate, tempVotes);
    }
  }

  function updateVoteCount() {
    const count = Object.values(tempVotes).filter(v => (voteStep === 1 ? v === 'O' : v === 'X')).length;
    document.getElementById('voteSelectionCount').innerText = `선택: ${count}명`;
  }

  // 점수 입력
  function updateDropdowns() {
    const select = document.getElementById('scoreMemberSelect');
    select.innerHTML = '<option value="">멤버를 선택하세요</option>' + 
      appData.members.map(m => `<option value="${m}">${m}</option>`).join('');
  }

  const scoreLabels = ["골레이", "아라", "피보", "픽소", "몸싸움", "균형감", "체력", "스피드", "리더십", "의사소통", "집중력", "대담성", "침착성", "일대일수비", "수비지원", "수비위치선정", "대인마크", "가로채기", "반사신경", "공중볼처리", "일대일돌파", "연계플레이", "공격위치선정", "슛파워"];

  function loadMemberScores() {
    const container = document.getElementById('scoreItems');
    container.innerHTML = scoreLabels.map(label => `
      <div class="mb-2 small fw-bold">${label}</div>
      <select class="form-control mb-3 score-val">
        <option value="5">5</option><option value="10">10</option><option value="13">13</option>
        <option value="16">16</option><option value="18">18</option>
      </select>
    `).join('');
  }

  function submitScores() {
    const name = document.getElementById('scoreMemberSelect').value;
    const scores = Array.from(document.querySelectorAll('.score-val')).map(s => s.value);
    if(!name) return alert("멤버를 선택하세요.");
    google.script.run.withSuccessHandler(() => alert("점수 저장 완료!")).saveScores(name, scores);
  }

  function showAbility(name) {
    document.getElementById('modalMemberName').innerText = name;
    google.script.run.withSuccessHandler(data => {
      const content = document.getElementById('abilityContent');
      content.innerHTML = data.map((val, i) => `<div class="d-flex justify-content-between border-bottom py-1"><span>항목 ${i+1}</span><b>${val}</b></div>`).join('');
      new bootstrap.Modal(document.getElementById('abilityModal')).show();
    }).getMemberAbilities(name);
  }
</script>
</body>
</html>
